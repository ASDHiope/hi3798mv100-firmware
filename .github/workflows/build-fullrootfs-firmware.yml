name: Build Full Firmware (Ubuntu 22.04 + 5.4 Kernel + Docker)
on:
  workflow_dispatch

concurrency:
  group: full-firmware-build-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  build-full-firmware:
    runs-on: ubuntu-22.04
    timeout-minutes: 240
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      # 内核配置
      ARCH: arm
      CROSS_COMPILE: arm-linux-gnueabihf-
      KERNEL_MAJOR: "5.4"
      KERNEL_FULL: "5.4.270"
      LOCALVERSION: ""
      SRC_DIR: linux-src
      KERNEL_OUT: kernel-output
      # RootFS配置
      ROOTFS_DIR: ubuntu-jammy-armhf-rootfs
      ROOTFS_IMG: hi3798mv100_rootfs_jammy.img
      # 最终固件输出
      FIRMWARE_OUT: firmware_output

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Cache toolchain, kernel source and rootfs packages
        uses: actions/cache@v3
        with:
          path: |
            ${{ env.SRC_DIR }}
            ~/.cache/apt
            /var/cache/apt/archives
          key: ${{ github.job }}-full-${{ hashFiles('**/dts/hi3798mv100.dts','.github/workflows/build-full-firmware.yml') }}

      # ====================== 第一阶段：安装所有依赖 ======================
      - name: Install all build dependencies
        run: |
          # 替换为华为云Ubuntu源
          sudo sed -i 's/archive.ubuntu.com/mirrors.huaweicloud.com/g' /etc/apt/sources.list
          sudo sed -i 's/security.ubuntu.com/mirrors.huaweicloud.com/g' /etc/apt/sources.list
          sudo apt update

          # 安装内核编译依赖
          sudo apt install -y build-essential gcc-arm-linux-gnueabihf binutils-arm-linux-gnueabihf \
            flex bison bc libncurses5-dev zlib1g-dev libssl-dev libelf-dev device-tree-compiler \
            u-boot-tools git wget cpio python3-pyelftools qemu-system-arm

          # 安装RootFS构建依赖
          sudo apt install -y debootstrap qemu-user-static binfmt-support e2fsprogs dosfstools kmod

      # ====================== 第二阶段：构建5.4 Docker专用内核 ======================
      - name: Download Linux 5.4 (清华+中科大双源+格式校验)
        run: |
          if [ ! -d ${{ env.SRC_DIR }} ];then
            echo "=== Downloading Linux ${{ env.KERNEL_FULL }} ==="
            
            MIRRORS=(
              "https://mirrors.tuna.tsinghua.edu.cn/kernel/v5.x/linux-${{ env.KERNEL_FULL }}.tar.xz"
              "https://mirrors.ustc.edu.cn/kernel/v5.x/linux-${{ env.KERNEL_FULL }}.tar.xz"
              "https://cdn.kernel.org/pub/linux/kernel/v5.x/linux-${{ env.KERNEL_FULL }}.tar.xz"
            )
            
            for MIRROR in "${MIRRORS[@]}"; do
              echo "Trying mirror: $MIRROR"
              wget -c --tries=2 --show-progress -O "linux-${{ env.KERNEL_FULL }}.tar.xz" "$MIRROR"
              
              if [ -f "linux-${{ env.KERNEL_FULL }}.tar.xz" ] && [ $(stat -c %s "linux-${{ env.KERNEL_FULL }}.tar.xz") -gt 100000000 ]; then
                echo "✅ Download completed, file size: $(du -h "linux-${{ env.KERNEL_FULL }}.tar.xz" | cut -f1)"
                
                if file "linux-${{ env.KERNEL_FULL }}.tar.xz" | grep -q "XZ compressed data"; then
                  echo "✅ File format verified: XZ compressed archive"
                  break
                else
                  echo "❌ ERROR: Downloaded file is NOT XZ format"
                  head -5 "linux-${{ env.KERNEL_FULL }}.tar.xz"
                  rm -f "linux-${{ env.KERNEL_FULL }}.tar.xz"
                fi
              else
                echo "❌ Download failed, cleaning up..."
                rm -f "linux-${{ env.KERNEL_FULL }}.tar.xz"
              fi
            done
            
            if [ ! -f "linux-${{ env.KERNEL_FULL }}.tar.xz" ]; then
              echo "❌ FATAL: All kernel mirrors failed"
              exit 1
            fi
            
            tar -xf "linux-${{ env.KERNEL_FULL }}.tar.xz"
            mv "linux-${{ env.KERNEL_FULL }}" ${{ env.SRC_DIR }}
            rm -f "linux-${{ env.KERNEL_FULL }}.tar.xz"
            
            echo "✅ Kernel source extracted successfully"
          else
            echo "✅ Using cached kernel source"
          fi

      - name: Import board DTS from repo dts folder
        run: |
          mkdir -p ${{ env.SRC_DIR }}/arch/arm/boot/dts
          if [ -f ./dts/hi3798mv100.dts ];then
            cp ./dts/hi3798mv100.dts ${{ env.SRC_DIR }}/arch/arm/boot/dts/
            echo 'dtb-$(CONFIG_ARCH_HISI) += hi3798mv100.dtb' >> ${{ env.SRC_DIR }}/arch/arm/boot/dts/Makefile
          fi

      - name: Generate hi3798mv100_defconfig (完整Docker cgroup v2支持)
        run: |
          cd ${{ env.SRC_DIR }}
          cat > arch/arm/configs/hi3798mv100_defconfig <<'DEFCFG'
          CONFIG_ARCH_HISI=y
          CONFIG_ARCH_HI3798MV100=y
          CONFIG_SOC_HI3798=y
          CONFIG_CPU_V7=y
          CONFIG_RAM_BASE=0x80000000
          CONFIG_CMDLINE="mem=1G console=ttyAMA0,115200"

          # 模块支持
          CONFIG_MODULES=y
          CONFIG_MODULE_UNLOAD=y
          CONFIG_MODULE_FORCE_UNLOAD=y
          CONFIG_MODVERSIONS=y
          CONFIG_MODULE_SRCVERSION_ALL=y

          # 完整cgroup v2支持(Docker 20.10+必需)
          CONFIG_CGROUPS=y
          CONFIG_CGROUP_FREEZER=y
          CONFIG_CGROUP_DEVICE=y
          CONFIG_CGROUP_CPUACCT=y
          CONFIG_CGROUP_SCHED=y
          CONFIG_CGROUP_PIDS=y
          CONFIG_MEMCG=y
          CONFIG_MEMCG_SWAP=y
          CONFIG_MEMCG_SWAP_ENABLED=y
          CONFIG_BLK_CGROUP=y
          CONFIG_BLK_CGROUP_IO=y
          CONFIG_CPUSETS=y
          CONFIG_CGROUP_PERF=y
          CONFIG_CGROUP_NET_PRIO=y
          CONFIG_CGROUP_NET_CLASSID=y
          CONFIG_CGROUP_V2=y

          # Base fs
          CONFIG_DEVTMPFS=y
          CONFIG_DEVTMPFS_MOUNT=y
          CONFIG_TMPFS=y
          CONFIG_TMPFS_POSIX_ACL=y
          CONFIG_EXT4_FS=y
          CONFIG_EXT4_FS_POSIX_ACL=y
          CONFIG_OVERLAY_FS=y
          CONFIG_OVERLAY_FS_REDIRECT_DIR=y
          CONFIG_OVERLAY_FS_INDEX=y

          # Basic posix feature
          CONFIG_POSIX_MQUEUE=y
          CONFIG_SIGNALFD=y
          CONFIG_TIMERFD=y
          CONFIG_EVENTFD=y
          CONFIG_EPOLL=y
          CONFIG_FUTEX=y
          CONFIG_INOTIFY_USER=y
          CONFIG_FHANDLE=y
          CONFIG_SYSFS=y
          CONFIG_PROC_FS=y

          # Docker网络必需
          CONFIG_NET=y
          CONFIG_INET=y
          CONFIG_IPV6=y
          CONFIG_HISI_ETH=y
          CONFIG_BRIDGE=y
          CONFIG_BRIDGE_NETFILTER=y
          CONFIG_VETH=y
          CONFIG_NETFILTER=y
          CONFIG_NETFILTER_ADVANCED=y
          CONFIG_NF_CONNTRACK=y
          CONFIG_NF_CONNTRACK_MARK=y
          CONFIG_NF_NAT=y
          CONFIG_NF_NAT_MASQUERADE=y
          CONFIG_IP_NF_FILTER=y
          CONFIG_IP_NF_TARGET_MASQUERADE=y
          CONFIG_IP_NF_NAT=y
          CONFIG_NETFILTER_XT_MATCH_ADDRTYPE=y
          CONFIG_NETFILTER_XT_MATCH_CONNTRACK=y
          CONFIG_NETFILTER_XT_MATCH_IPVS=y

          # MMC & Storage
          CONFIG_MMC=y
          CONFIG_MMC_BLOCK=y
          CONFIG_MMC_DW=y
          CONFIG_MMC_DW_HISI=y

          # Disable debug to shrink size
          CONFIG_DEBUG_FS=n
          CONFIG_DEBUG_KERNEL=n
          CONFIG_KALLSYMS_ALL=n
          DEFCFG
          # 清空LOCALVERSION配置，无自定义后缀
          sed -i '/CONFIG_LOCALVERSION/d' arch/arm/configs/hi3798mv100_defconfig
          sed -i '/CONFIG_LOCALVERSION_AUTO/d' arch/arm/configs/hi3798mv100_defconfig

      - name: Kernel make config
        run: |
          cd ${{ env.SRC_DIR }}
          make hi3798mv100_defconfig
          make olddefconfig
          # 校验Docker必需配置
          grep CONFIG_CGROUP_V2=y .config || echo "ERROR: cgroup v2 NOT enabled!"
          grep CONFIG_OVERLAY_FS=y .config || echo "ERROR: overlay fs NOT enabled!"

      - name: Compile kernel zImage / dtb / modules
        run: |
          mkdir -p ${{ env.KERNEL_OUT }}/kmodules ${{ env.KERNEL_OUT }}/dtbs
          cd ${{ env.SRC_DIR }}
          make -j$(nproc) zImage dtbs modules
          make INSTALL_MOD_PATH=../${{ env.KERNEL_OUT }}/kmodules modules_install
          mkimage -A arm -O linux -T kernel -C none -a 0x80008000 -e 0x80008000 \
            -n "Linux-${{ env.KERNEL_MAJOR }}" -d arch/arm/boot/zImage ../${{ env.KERNEL_OUT }}/hi_kernel_new.bin
          cp arch/arm/boot/dts/hi3798mv100.dtb ../${{ env.KERNEL_OUT }}/dtbs/

      - name: Generate first-boot fix script (Docker优化版)
        run: |
          mkdir -p ${{ env.KERNEL_OUT }}/scripts
          cat > ${{ env.KERNEL_OUT }}/scripts/first_boot_fix.sh <<'SHEOF'
          #!/bin/sh
          swapoff -a; sed -i '/swap/d' /etc/fstab; rm -rf /swapfile
          dd if=/dev/zero of=/dev/mmcblk0p2 bs=1M count=1
          printf 'model=mv100 console=ttyAMA0,115200 root=/dev/mmcblk0p9 rootfstype=ext4 rootwait rootflags=noload mem=1G mmz=ddr,0,0,60M vmalloc=500M systemd.unified_cgroup_hierarchy=1 blkdevparts=mmcblk0:1M(boot),1M(bootargs),4M(baseparam),4M(pqparam),4M(logo),20M(kernel),64M(busybox),512M(backup),-(ubuntu)'|dd of=/dev/mmcblk0p2 bs=1 conv=notrunc
          chattr -i /etc/resolv.conf;echo -e 'nameserver 223.5.5.5\nnameserver 119.29.29.29'>/etc/resolv.conf;chattr +i /etc/resolv.conf
          mkdir -p /etc/apt/apt.conf.d;echo 'APT::Sandbox::Seccomp "false";'>/etc/apt/apt.conf.d/99no-seccomp
          # Docker首次启动优化
          mkdir -p /var/lib/docker
          sync;resize2fs /dev/mmcblk0p9
          # 标记首次启动完成
          touch /etc/first-boot-completed
          sleep 3;reboot
          SHEOF
          chmod +x ${{ env.KERNEL_OUT }}/scripts/first_boot_fix.sh

      # ====================== 第三阶段：构建Ubuntu 22.04 RootFS ======================
      - name: Create RootFS via Debootstrap (华为云源)
        run: |
          # 下载基础系统 (armhf架构, Ubuntu 22.04 Jammy)
          sudo debootstrap --arch=armhf --foreign jammy ./${{ env.ROOTFS_DIR }} http://mirrors.huaweicloud.com/ubuntu-ports/
          # 复制 QEMU 模拟器，以便后续 chroot 执行命令
          sudo cp /usr/bin/qemu-arm-static ./${{ env.ROOTFS_DIR }}/usr/bin/

      - name: Finalize System and Set Config (Docker预配置)
        run: |
          export ROOTFS_DIR="./${{ env.ROOTFS_DIR }}"
          
          # 1. 执行 Second Stage (完成基础软件包安装)
          echo "=> Executing debootstrap second-stage..."
          sudo chroot ${ROOTFS_DIR} /debootstrap/debootstrap --second-stage
          
          # 2. 挂载 proc 和 sys 并安装必要的软件包
          echo "=> Installing common tools and network utilities..."
          sudo mount -t proc /proc ${ROOTFS_DIR}/proc
          sudo mount -t sysfs /sys ${ROOTFS_DIR}/sys
          sudo chroot ${ROOTFS_DIR} apt-get update
          # 安装常用的网络与调试工具 + Docker依赖
          sudo chroot ${ROOTFS_DIR} apt-get install -y \
            openssh-server iproute2 \
            vim nano curl wget \
            net-tools iputils-ping ssh tcpdump \
            htop sudo lsb-release procps \
            ca-certificates curl gnupg lsb-release
          sudo umount ${ROOTFS_DIR}/proc
          sudo umount ${ROOTFS_DIR}/sys
          
          # 3. 设置 APT 源 (华为云，包含 updates 和 security)
          echo "=> Configuring APT sources..."
          cat << 'EOF' | sudo tee ${ROOTFS_DIR}/etc/apt/sources.list
          deb https://mirrors.huaweicloud.com/ubuntu-ports/ jammy main restricted universe multiverse
          deb https://mirrors.huaweicloud.com/ubuntu-ports/ jammy-updates main restricted universe multiverse
          deb https://mirrors.huaweicloud.com/ubuntu-ports/ jammy-security main restricted universe multiverse
          EOF
          
          # 4. 设置 root 默认密码为 123456
          echo "=> Setting root password..."
          sudo chroot ${ROOTFS_DIR} /bin/bash -c 'echo "root:123456" | chpasswd'
          
          # 5. 配置 SSH 允许 root 远程登录
          echo "=> Configuring SSH..."
          printf "PermitRootLogin yes\nPasswordAuthentication yes\n" | sudo tee -a ${ROOTFS_DIR}/etc/ssh/sshd_config > /dev/null
          
          # 6. 使用 Netplan 配置网卡 eth0
          echo "=> Writing Netplan network config..."
          sudo mkdir -p ${ROOTFS_DIR}/etc/netplan/
          sudo tee ${ROOTFS_DIR}/etc/netplan/01-netcfg.yaml > /dev/null << 'EOF'
          network:
            version: 2
            renderer: networkd
            ethernets:
              eth0:
                dhcp4: true
                macaddress: BC:25:E0:3F:F1:D9
          EOF
          # 7. 启用网络服务开机自启
          echo "=> Enabling network service..."
          sudo chroot ${ROOTFS_DIR} systemctl enable systemd-networkd
          sudo chroot ${ROOTFS_DIR} systemctl enable systemd-resolved
          
          # 8. Docker预配置
          echo "=> Pre-configuring Docker environment..."
          # Docker必需的sysctl配置
          sudo tee ${ROOTFS_DIR}/etc/sysctl.d/99-docker.conf << 'EOF'
          # Docker网络必需
          net.ipv4.ip_forward=1
          net.bridge.bridge-nf-call-iptables=1
          net.bridge.bridge-nf-call-ip6tables=1
          net.ipv4.conf.all.forwarding=1
          net.ipv4.conf.default.forwarding=1

          # 优化Docker内存使用(机顶盒1GB内存专用)
          vm.swappiness=0
          vm.overcommit_memory=1
          vm.dirty_ratio=5
          vm.dirty_background_ratio=2
          EOF
          
          # 预配置Docker daemon.json
          sudo mkdir -p ${ROOTFS_DIR}/etc/docker
          sudo tee ${ROOTFS_DIR}/etc/docker/daemon.json << 'EOF'
          {
            "log-driver": "json-file",
            "log-opts": {
              "max-size": "10m",
              "max-file": "3"
            },
            "exec-opts": ["native.cgroupdriver=systemd"],
            "storage-driver": "overlay2",
            "storage-opts": [
              "overlay2.override_kernel_check=true"
            ],
            "registry-mirrors": [
              "https://docker.mirrors.ustc.edu.cn",
              "https://hub-mirror.c.163.com"
            ]
          }
          EOF
          
          # 预添加Docker官方GPG密钥和源(加速安装)
          sudo mkdir -p ${ROOTFS_DIR}/etc/apt/keyrings
          sudo wget -qO ${ROOTFS_DIR}/etc/apt/keyrings/docker.asc \
            https://download.docker.com/linux/ubuntu/gpg
          sudo chmod a+r ${ROOTFS_DIR}/etc/apt/keyrings/docker.asc
          echo "deb [arch=armhf signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu jammy stable" | \
            sudo tee ${ROOTFS_DIR}/etc/apt/sources.list.d/docker.list > /dev/null
          
          # 9. 清理 apt 缓存，减小镜像体积
          sudo chroot ${ROOTFS_DIR} apt-get clean
          sudo rm -rf ${ROOTFS_DIR}/var/lib/apt/lists/*

      - name: Package RootFS to EXT4
        run: |
          DIR="./${{ env.ROOTFS_DIR }}"
          
          # 动态计算文件夹大小并预留 300MB 空间(Docker安装需要)
          SIZE=$(sudo du -sm $DIR | cut -f1)
          IMAGE_SIZE=$((SIZE + 300))
          echo "Folder size: ${SIZE}MB, Creating image with size: ${IMAGE_SIZE}MB"
          
          # 创建空镜像文件
          dd if=/dev/zero of=${{ env.ROOTFS_IMG }} bs=1M count=$IMAGE_SIZE status=progress
          # 格式化为 ext4
          mkfs.ext4 -F ${{ env.ROOTFS_IMG }}
          
          # 挂载并复制文件系统内容
          sudo mkdir -p /mnt/temp
          sudo mount -o loop ${{ env.ROOTFS_IMG }} /mnt/temp
          sudo cp -a $DIR/. /mnt/temp/
          sudo umount /mnt/temp
          
          # 检查文件系统并压缩镜像到最小体积
          e2fsck -f -y ${{ env.ROOTFS_IMG }} || true
          resize2fs -M ${{ env.ROOTFS_IMG }} || true

      # ====================== 第四阶段：集成内核与RootFS，打包固件 ======================
      - name: Integrate kernel modules into RootFS
        run: |
          # 挂载RootFS
          sudo mkdir -p /mnt/rootfs
          sudo mount -o loop ${{ env.ROOTFS_IMG }} /mnt/rootfs
          
          # 1. 安装5.4内核模块
          sudo cp -r ${{ env.KERNEL_OUT }}/kmodules/lib/modules/* /mnt/rootfs/lib/modules/
          sudo depmod -a -b /mnt/rootfs $(ls ${{ env.KERNEL_OUT }}/kmodules/lib/modules/)
          
          # 2. 安装first-boot-fix.sh并设置开机自启
          sudo cp ${{ env.KERNEL_OUT }}/scripts/first_boot_fix.sh /mnt/rootfs/usr/local/bin/
          sudo chmod +x /mnt/rootfs/usr/local/bin/first_boot_fix.sh
          
          sudo tee /mnt/rootfs/etc/systemd/system/first-boot-fix.service << 'EOF'
          [Unit]
          Description=Hi3798MV100 5.4内核首次启动修复
          Before=multi-user.target
          ConditionPathExists=!/etc/first-boot-completed

          [Service]
          Type=oneshot
          ExecStart=/usr/local/bin/first_boot_fix.sh
          RemainAfterExit=yes

          [Install]
          WantedBy=multi-user.target
          EOF
          sudo ln -sf /etc/systemd/system/first-boot-fix.service \
            /mnt/rootfs/etc/systemd/system/multi-user.target.wants/
          
          # 卸载RootFS
          sudo umount /mnt/rootfs
          echo "✅ 内核与RootFS集成完成"

      - name: Write 1GB bootargs partition image (启用cgroup v2)
        run: |
          echo "=== Creating bootargs partition image ==="
          dd if=/dev/zero of=bootargs_1g.bin bs=1M count=1 2>/dev/null
          # 关键修改：systemd.unified_cgroup_hierarchy=1 强制启用cgroup v2
          printf 'model=mv100 console=ttyAMA0,115200 root=/dev/mmcblk0p9 rootfstype=ext4 rootwait rootflags=noload mem=1G mmz=ddr,0,0,60M vmalloc=500M systemd.unified_cgroup_hierarchy=1 systemd.mask=create-swapfile.service systemd.mask=swap-create.service systemd.mask=swapfile.service blkdevparts=mmcblk0:1M(boot),1M(bootargs),4M(baseparam),4M(pqparam),4M(logo),20M(kernel),64M(busybox),512M(backup),-(ubuntu)' | dd of=bootargs_1g.bin bs=1 conv=notrunc 2>/dev/null
          echo "bootargs_1g.bin created: $(ls -lh bootargs_1g.bin | awk '{print $5}')"

      - name: Package final firmware
        run: |
          mkdir -p ${{ env.FIRMWARE_OUT }}

          # 复制所有刷机必需文件
          cp ${{ env.KERNEL_OUT }}/hi_kernel_new.bin ${{ env.FIRMWARE_OUT }}/
          cp ${{ env.ROOTFS_IMG }} ${{ env.FIRMWARE_OUT }}/backup-32.raw
          cp bootargs_1g.bin ${{ env.FIRMWARE_OUT }}/
          cp -r ${{ env.KERNEL_OUT }}/dtbs/ ${{ env.FIRMWARE_OUT }}/

          # 如果有原SDK的fastboot.bin也复制过来
          if [ -d ./HiSTBLinuxV100R005C00SPC060/source/boot ];then
            cd ./HiSTBLinuxV100R005C00SPC060/source/boot
            make -j$(nproc) || true
            [ -f fastboot.bin ] && cp fastboot.bin ../../../${{ env.FIRMWARE_OUT }}/
          fi

          # 执行原有的打包脚本(如果有)
          if [ -f scripts/package_firmware.sh ]; then
            chmod +x scripts/package_firmware.sh
            bash scripts/package_firmware.sh ${{ env.FIRMWARE_OUT }}/
          fi

      - name: Final artifact check
        run: |
          echo "=== 最终固件产物列表 ==="
          ls -lh ${{ env.FIRMWARE_OUT }}
          echo "内核版本信息:"
          strings ${{ env.FIRMWARE_OUT }}/hi_kernel_new.bin | grep "Linux version" | head -2
          echo "RootFS镜像大小:"
          du -h ${{ env.FIRMWARE_OUT }}/backup-32.raw

      - name: Upload full firmware artifact
        uses: actions/upload-artifact@v6
        with:
          name: hi3798mv100-full-firmware-ubuntu22.04-docker
          path: ${{ env.FIRMWARE_OUT }}/
          retention-days: 30

      - name: Create release
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: full-firmware-ubuntu22.04-${{ github.run_number }}
          name: Hi3798MV100 完整固件 Ubuntu22.04+5.4+Docker Build #${{ github.run_number }}
          files: ${{ env.FIRMWARE_OUT }}/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
