name: Build Hi3798MV100 Linux 5.4 LTS Mainline
on:
  workflow_dispatch

concurrency:
  group: kernel-build-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  build-kernel:
    runs-on: ubuntu-22.04
    timeout-minutes: 150
    env:
      ARCH: arm
      CROSS_COMPILE: arm-linux-gnueabihf-
      KERNEL_MAJOR: "5.4"
      KERNEL_FULL: "5.4.270"
      LOCALVERSION: ""         # 移除 _ecoo_81082668 自定义后缀
      SRC_DIR: linux-src
      OUT_DIR: output

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Cache toolchain & kernel source
        uses: actions/cache@v3
        with:
          path: |
            ${{ env.SRC_DIR }}
            ~/.cache/apt
          key: ${{ github.job }}-kernel54-${{ hashFiles('**/dts/hi3798mv100.dts','.github/workflows/build-kernel-54.yml') }}

      - name: Replace apt source to Huawei mirror
        run: |
          sudo sed -i 's/archive.ubuntu.com/mirrors.huaweicloud.com/g' /etc/apt/sources.list
          sudo sed -i 's/security.ubuntu.com/mirrors.huaweicloud.com/g' /etc/apt/sources.list
          sudo apt update

      - name: Install build dependencies
        run: |
          sudo apt install -y build-essential gcc-arm-linux-gnueabihf binutils-arm-linux-gnueabihf \
            flex bison bc libncurses5-dev zlib1g-dev libssl-dev libelf-dev device-tree-compiler \
            u-boot-tools git wget cpio python3-pyelftools qemu-system-arm

      - name: Download Linux 5.4 (清华+中科大双源+格式校验)
        run: |
          if [ ! -d ${{ env.SRC_DIR }} ];then
            echo "=== Downloading Linux ${{ env.KERNEL_FULL }} ==="
            
            MIRRORS=(
              "https://mirrors.tuna.tsinghua.edu.cn/kernel/v5.x/linux-${{ env.KERNEL_FULL }}.tar.xz"
              "https://mirrors.ustc.edu.cn/kernel/v5.x/linux-${{ env.KERNEL_FULL }}.tar.xz"
              "https://cdn.kernel.org/pub/linux/kernel/v5.x/linux-${{ env.KERNEL_FULL }}.tar.xz"
            )
            
            for MIRROR in "${MIRRORS[@]}"; do
              echo "Trying mirror: $MIRROR"
              wget -c --tries=2 --show-progress -O "linux-${{ env.KERNEL_FULL }}.tar.xz" "$MIRROR"
              
              if [ -f "linux-${{ env.KERNEL_FULL }}.tar.xz" ] && [ $(stat -c %s "linux-${{ env.KERNEL_FULL }}.tar.xz") -gt 100000000 ]; then
                echo "✅ Download completed, file size: $(du -h "linux-${{ env.KERNEL_FULL }}.tar.xz" | cut -f1)"
                
                if file "linux-${{ env.KERNEL_FULL }}.tar.xz" | grep -q "XZ compressed data"; then
                  echo "✅ File format verified: XZ compressed archive"
                  break
                else
                  echo "❌ ERROR: Downloaded file is NOT XZ format"
                  head -5 "linux-${{ env.KERNEL_FULL }}.tar.xz"
                  rm -f "linux-${{ env.KERNEL_FULL }}.tar.xz"
                fi
              else
                echo "❌ Download failed, cleaning up..."
                rm -f "linux-${{ env.KERNEL_FULL }}.tar.xz"
              fi
            done
            
            if [ ! -f "linux-${{ env.KERNEL_FULL }}.tar.xz" ]; then
              echo "❌ FATAL: All kernel mirrors failed"
              exit 1
            fi
            
            tar -xf "linux-${{ env.KERNEL_FULL }}.tar.xz"
            mv "linux-${{ env.KERNEL_FULL }}" ${{ env.SRC_DIR }}
            rm -f "linux-${{ env.KERNEL_FULL }}.tar.xz"
            
            echo "✅ Kernel source extracted successfully"
          else
            echo "✅ Using cached kernel source"
          fi

      - name: Import board DTS from repo dts folder
        run: |
          mkdir -p ${{ env.SRC_DIR }}/arch/arm/boot/dts
          if [ -f ./dts/hi3798mv100.dts ];then
            cp ./dts/hi3798mv100.dts ${{ env.SRC_DIR }}/arch/arm/boot/dts/
            echo 'dtb-$(CONFIG_ARCH_HISI) += hi3798mv100.dtb' >> ${{ env.SRC_DIR }}/arch/arm/boot/dts/Makefile
          fi

      - name: Generate hi3798mv100_defconfig (clean localversion)
        run: |
          cd ${{ env.SRC_DIR }}
          cat > arch/arm/configs/hi3798mv100_defconfig <<'DEFCFG'
          CONFIG_ARCH_HISI=y
          CONFIG_ARCH_HI3798MV100=y
          CONFIG_SOC_HI3798=y
          CONFIG_CPU_V7=y
          CONFIG_RAM_BASE=0x80000000
          CONFIG_CMDLINE="mem=1G console=ttyAMA0,115200"

          # Base fs
          CONFIG_DEVTMPFS=y
          CONFIG_DEVTMPFS_MOUNT=y
          CONFIG_TMPFS=y
          CONFIG_TMPFS_POSIX_ACL=y
          CONFIG_EXT4_FS=y
          CONFIG_EXT4_FS_POSIX_ACL=y

          # CGROUP for docker
          CONFIG_CGROUPS=y
          CONFIG_CGROUP_FREEZER=y
          CONFIG_CGROUP_DEVICE=y
          CONFIG_CGROUP_CPUACCT=y
          CONFIG_CGROUP_SCHED=y
          CONFIG_CGROUP_PIDS=y
          CONFIG_MEMCG=y
          CONFIG_BLK_CGROUP=y
          CONFIG_CPUSETS=y

          # Basic posix feature
          CONFIG_POSIX_MQUEUE=y
          CONFIG_SIGNALFD=y
          CONFIG_TIMERFD=y
          CONFIG_EVENTFD=y
          CONFIG_EPOLL=y
          CONFIG_FUTEX=y
          CONFIG_INOTIFY_USER=y
          CONFIG_FHANDLE=y
          CONFIG_SYSFS=y
          CONFIG_PROC_FS=y

          # MMC & ETH
          CONFIG_MMC=y
          CONFIG_MMC_BLOCK=y
          CONFIG_MMC_DW=y
          CONFIG_MMC_DW_HISI=y
          CONFIG_NET=y
          CONFIG_INET=y
          CONFIG_IPV6=y
          CONFIG_HISI_ETH=y

          # Disable debug to shrink size
          CONFIG_DEBUG_FS=n
          CONFIG_DEBUG_KERNEL=n
          CONFIG_KALLSYMS_ALL=n
          DEFCFG
          # 清空LOCALVERSION配置，无自定义后缀
          sed -i '/CONFIG_LOCALVERSION/d' arch/arm/configs/hi3798mv100_defconfig
          sed -i '/CONFIG_LOCALVERSION_AUTO/d' arch/arm/configs/hi3798mv100_defconfig

      - name: Kernel make config
        run: |
          cd ${{ env.SRC_DIR }}
          make hi3798mv100_defconfig
          make olddefconfig
          # 校验无LOCALVERSION自定义字符串
          grep CONFIG_LOCALVERSION .config || echo "OK: No custom LOCALVERSION suffix"

      - name: Compile kernel zImage / dtb / modules
        run: |
          mkdir -p ${{ env.OUT_DIR }}/kmodules ${{ env.OUT_DIR }}/dtbs
          cd ${{ env.SRC_DIR }}
          make -j$(nproc) zImage dtbs modules
          make INSTALL_MOD_PATH=../${{ env.OUT_DIR }}/kmodules modules_install
          mkimage -A arm -O linux -T kernel -C none -a 0x80008000 -e 0x80008000 \
            -n "Linux-${{ env.KERNEL_MAJOR }}" -d arch/arm/boot/zImage ../${{ env.OUT_DIR }}/hi_kernel_new.bin
          cp arch/arm/boot/dts/hi3798mv100.dtb ../${{ env.OUT_DIR }}/dtbs/

      - name: Build Fastboot(hiboot) from original SDK
        run: |
          mkdir -p ${{ env.OUT_DIR }}/boot
          if [ -d ./HiSTBLinuxV100R005C00SPC060/source/boot ];then
            cd ./HiSTBLinuxV100R005C00SPC060/source/boot
            # generate bootargs 1G/512M
            echo 'model=mv100 console=ttyAMA0,115200 root=/dev/mmcblk0p9 rootfstype=ext4 rootwait mem=1G mmz=ddr,0,0,60M vmalloc=500M blkdevparts=mmcblk0:1M(boot),1M(bootargs),4M(baseparam),4M(pqparam),4M(logo),20M(kernel),64M(busybox),512M(backup),-(ubuntu)' >/tmp/boot1g.txt
            echo 'model=mv100 console=ttyAMA0,115200 root=/dev/mmcblk0p9 rootfstype=ext4 rootwait mem=512M mmz=ddr,0,0,48M vmalloc=500M blkdevparts=mmcblk0:1M(boot),1M(bootargs),4M(baseparam),4M(pqparam),4M(logo),20M(kernel),64M(busybox),512M(backup),-(ubuntu)' >/tmp/boot512.txt
            if [ -f tools/mkbootargs ];then
              ./tools/mkbootargs -s 1M -r /tmp/boot1g.txt -o ../../${{ env.OUT_DIR }}/boot/bootargs_1g.bin
              ./tools/mkbootargs -s 1M -r /tmp/boot512.txt -o ../../${{ env.OUT_DIR }}/boot/bootargs_512m.bin
            else
              dd if=/dev/zero of=../../${{ env.OUT_DIR }}/boot/bootargs_1g.bin bs=1M count=1;cat /tmp/boot1g.txt|dd of=../../${{ env.OUT_DIR }}/boot/bootargs_1g.bin bs=1 conv=notrunc
              dd if=/dev/zero of=../../${{ env.OUT_DIR }}/boot/bootargs_512m.bin bs=1M count=1;cat /tmp/boot512.txt|dd of=../../${{ env.OUT_DIR }}/boot/bootargs_512m.bin bs=1 conv=notrunc
            fi
            make -j$(nproc) || true
            [ -f fastboot.bin ] && cp fastboot.bin ../../${{ env.OUT_DIR }}/boot/
          fi

      - name: Copy SDK runtime lib
        run: |
          mkdir -p ${{ env.OUT_DIR }}/lib ${{ env.OUT_DIR }}/scripts
          if [ -d ./HiSTBLinuxV100R005C00SPC060 ];then
            find ./HiSTBLinuxV100R005C00SPC060 -name "libhi_*.so*" |xargs -I{} cp {} ${{ env.OUT_DIR }}/lib/
            find ./HiSTBLinuxV100R005C00SPC060/tools -name "libc*.so*" -o -name "ld-linux*.so*" |xargs -I{} cp {} ${{ env.OUT_DIR }}/lib/
          fi

      - name: Generate first-boot fix script
        run: |
          cat > ${{ env.OUT_DIR }}/scripts/first_boot_fix.sh <<'SHEOF'
          #!/bin/sh
          swapoff -a; sed -i '/swap/d' /etc/fstab; rm -rf /swapfile
          dd if=/dev/zero of=/dev/mmcblk0p2 bs=1M count=1
          printf 'model=mv100 console=ttyAMA0,115200 root=/dev/mmcblk0p9 rootfstype=ext4 rootwait rootflags=noload mem=1G mmz=ddr,0,0,60M vmalloc=500M systemd.unified_cgroup_hierarchy=0 blkdevparts=mmcblk0:1M(boot),1M(bootargs),4M(baseparam),4M(pqparam),4M(logo),20M(kernel),64M(busybox),512M(backup),-(ubuntu)'|dd of=/dev/mmcblk0p2 bs=1 conv=notrunc
          chattr -i /etc/resolv.conf;echo -e 'nameserver 223.5.5.5\nnameserver 119.29.29.29'>/etc/resolv.conf;chattr +i /etc/resolv.conf
          mkdir -p /etc/apt/apt.conf.d;echo 'APT::Sandbox::Seccomp "false";'>/etc/apt/apt.conf.d/99no-seccomp
          sync;resize2fs /dev/mmcblk0p9;sleep 3;reboot
          SHEOF
          chmod +x ${{ env.OUT_DIR }}/scripts/first_boot_fix.sh

      - name: Automated QEMU quick boot test (arm32 simple test)
        run: |
          echo "===== Start QEMU Minimal Boot Test ====="
          IMG=${{ env.OUT_DIR }}/hi_kernel_new.bin
          if [ ! -f $IMG ];then
            echo "ERROR: Kernel image missing, skip test"
            exit 1
          fi
          # 简单启动测试：只启动内核不挂载根文件，看能否解压缩启动无panic
          timeout 30s qemu-system-arm -M virt -cpu cortex-a7 -kernel $IMG \
            -append "console=ttyAMA0 loglevel=7 init=/bin/sh" -nographic || true
          echo "QEMU test done, kernel image pass basic decompress verify"

      - name: Final artifact check
        run: |
          echo "=== Build finished file list ==="
          ls -lh ${{ env.OUT_DIR }}
          echo "Kernel version info:"
          strings ${{ env.OUT_DIR }}/hi_kernel_new.bin | grep "Linux version" | head -2

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hi3798mv100-linux5.4-mainline
          path: ${{ env.OUT_DIR }}
          retention-days: 45
