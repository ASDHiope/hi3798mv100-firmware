name: Build Full Firmware (Ubuntu 24.04 LTS + 4.4.y Kernel)
on:
  workflow_dispatch:
    inputs:
      base_image_url:
        description: 'URL to download base rootfs ext4 image (backup-32.raw)'
        required: true
        default: ''
      kernel_artifact:
        description: 'Kernel build artifact name (empty = build kernel too)'
        required: false
        default: ''

concurrency:
  group: firmware-build-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  build-firmware:
    runs-on: ubuntu-22.04  # 注意：Ubuntu 24.04 runner编译4.4.y内核会有gcc版本问题，用22.04更稳定
    timeout-minutes: 180
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      NODE_OPTIONS: "--no-deprecation"
      # SDK配置（使用国内Gitee可用镜像）
      SDK_REPO: "https://gitee.com/lh736/HiSTBLinuxV100R005C00SPC060.git"
      SDK_DIR: "HiSTBLinuxV100R005C00SPC060"
      # 内核配置
      KERNEL_VERSION: "4.4.35"
      KERNEL_MIRROR: "https://mirrors.huaweicloud.com/linux/kernel/v4.x"
      # 最终输出
      FIRMWARE_OUT: "firmware_output"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Cache SDK and kernel source
        uses: actions/cache@v5
        with:
          path: |
            ${{ env.SDK_DIR }}
            linux-${{ env.KERNEL_VERSION }}.tar.gz
          key: ${{ github.job }}-sdk-kernel-${{ hashFiles('.github/workflows/build-firmware.yml') }}
      
      # ====================== 第一阶段：安装依赖 ======================
      - name: Install all build dependencies
        run: |
          # 替换为华为云Ubuntu源加速
          sudo sed -i 's/archive.ubuntu.com/mirrors.huaweicloud.com/g' /etc/apt/sources.list
          sudo sed -i 's/security.ubuntu.com/mirrors.huaweicloud.com/g' /etc/apt/sources.list
          sudo apt update
          
          # 安装编译依赖（添加gcc-9兼容4.4.y内核）
          sudo apt install -y \
            build-essential gcc-9-arm-linux-gnueabihf g++-9-arm-linux-gnueabihf \
            binutils-arm-linux-gnueabihf cpp-arm-linux-gnueabihf \
            make gettext bison flex bc zlib1g-dev libncurses5-dev \
            lzma u-boot-tools device-tree-compiler git cpio \
            python3 python3-pyelftools libssl-dev wget \
            qemu-user-static debootstrap dpkg-cross \
            android-sdk-libsparse-utils e2fsprogs lib32z1 lib32stdc++6
          
          # 设置gcc-9为默认arm编译器（4.4.y内核不支持gcc-11+）
          sudo update-alternatives --install /usr/bin/arm-linux-gnueabihf-gcc arm-linux-gnueabihf-gcc /usr/bin/arm-linux-gnueabihf-gcc-9 90
          sudo update-alternatives --install /usr/bin/arm-linux-gnueabihf-g++ arm-linux-gnueabihf-g++ /usr/bin/arm-linux-gnueabihf-g++-9 90
          
          # 验证编译器版本
          arm-linux-gnueabihf-gcc --version

      # ====================== 第二阶段：下载基础根文件系统 ======================
      - name: Download Ubuntu 24.04 base rootfs image
        run: |
          if [ -n "${{ github.event.inputs.base_image_url }}" ]; then
            echo "=== 下载基础根文件系统 ==="
            wget -q --show-progress "${{ github.event.inputs.base_image_url }}" -O backup-32.raw
            
            # 验证文件完整性
            if [ -f backup-32.raw ] && [ $(stat -c %s backup-32.raw) -gt 100000000 ]; then
              echo "✅ 基础镜像下载成功，大小: $(du -h backup-32.raw | cut -f1)"
            else
              echo "❌ 基础镜像下载失败或文件损坏"
              exit 1
            fi
          else
            echo "❌ 错误：未提供基础镜像URL"
            exit 1
          fi

      # ====================== 第三阶段：编译4.4.y内核（从海思SDK） ======================
      - name: Build 4.4.y kernel from HiSTB SDK
        if: github.event.inputs.kernel_artifact == ''
        run: |
          echo "=== 开始编译4.4.y内核 ==="
          
          # 克隆SDK（如果没有缓存）
          if [ ! -d "${{ env.SDK_DIR }}" ]; then
            echo "克隆SDK: ${{ env.SDK_REPO }}"
            git clone --depth 1 ${{ env.SDK_REPO }} ${{ env.SDK_DIR }}
          else
            echo "✅ 使用缓存的SDK"
            cd ${{ env.SDK_DIR }}
            git pull || true
            cd ..
          fi
          
          # 下载内核源码（如果没有缓存）
          if [ ! -f "linux-${{ env.KERNEL_VERSION }}.tar.gz" ]; then
            echo "下载内核源码: ${{ env.KERNEL_MIRROR }}/linux-${{ env.KERNEL_VERSION }}.tar.gz"
            wget -q "${{ env.KERNEL_MIRROR }}/linux-${{ env.KERNEL_VERSION }}.tar.gz"
          else
            echo "✅ 使用缓存的内核源码"
          fi
          
          # 解压并修复SDK内核脚本缺失问题
          echo "修复SDK内核脚本..."
          tar xzf "linux-${{ env.KERNEL_VERSION }}.tar.gz"
          SDK_KERNEL="${{ env.SDK_DIR }}/source/kernel/linux-4.4.y"
          
          # 复制缺失的编译脚本
          [ ! -d "${SDK_KERNEL}/scripts/basic" ] && cp -r "linux-${{ env.KERNEL_VERSION }}/scripts/basic/" "${SDK_KERNEL}/scripts/"
          [ ! -d "${SDK_KERNEL}/scripts/kconfig" ] && cp -r "linux-${{ env.KERNEL_VERSION }}/scripts/kconfig/" "${SDK_KERNEL}/scripts/"
          
          # 复制自定义设备树
          if [ -f "./dts/hi3798mv100.dts" ]; then
            echo "复制自定义设备树"
            cp ./dts/hi3798mv100.dts "${SDK_KERNEL}/arch/arm/boot/dts/"
          fi
          
          # 配置并编译内核
          cd ${{ env.SDK_DIR }}
          cp configs/hi3798mv100/hi3798mdmo1g_hi3798mv100_cfg.mak cfg.mak
          source env.sh
          
          echo "开始编译内核..."
          make linux -j$(nproc)
          
          # 复制编译好的内核
          if [ -f "out/hi3798mv100/hi3798mdmo1g/image/emmc_image/hi_kernel.bin" ]; then
            cp out/hi3798mv100/hi3798mdmo1g/image/emmc_image/hi_kernel.bin ../hi_kernel_new.bin
            echo "✅ 内核编译成功，文件大小: $(du -h ../hi_kernel_new.bin | cut -f1)"
          else
            echo "❌ 内核编译失败"
            exit 1
          fi

      # ====================== 第四阶段：下载预编译内核（可选） ======================
      - name: Download prebuilt kernel artifact
        if: github.event.inputs.kernel_artifact != ''
        uses: actions/download-artifact@v6
        with:
          name: ${{ github.event.inputs.kernel_artifact }}
          path: kernel-artifact/

      # ====================== 第五阶段：修改根文件系统 ======================
      - name: Modify Ubuntu 24.04 rootfs
        run: |
          if [ -f "scripts/modify_rootfs.sh" ]; then
            chmod +x scripts/modify_rootfs.sh
            echo "=== 开始修改根文件系统 ==="
            sudo bash scripts/modify_rootfs.sh backup-32.raw
          else
            echo "⚠️ 未找到modify_rootfs.sh脚本，跳过根文件系统修改"
          fi

      # ====================== 第六阶段：生成多内存版本bootargs ======================
      - name: Generate multi-version bootargs (1G/768M/512M)
        run: |
          echo "=== 生成所有内存版本的bootargs ==="
          
          # 1GB内存版本
          dd if=/dev/zero of=bootargs_1g.bin bs=1M count=1 2>/dev/null
          printf 'model=mv100 console=ttyAMA0,115200 root=/dev/mmcblk0p9 rootfstype=ext4 rootwait rootflags=noload mem=1G mmz=ddr,0,0,60M vmalloc=500M systemd.unified_cgroup_hierarchy=1 systemd.mask=create-swapfile.service blkdevparts=mmcblk0:1M(boot),1M(bootargs),4M(baseparam),4M(pqparam),4M(logo),20M(kernel),64M(busybox),512M(backup),-(ubuntu)' | dd of=bootargs_1g.bin bs=1 conv=notrunc 2>/dev/null
          echo "✅ bootargs_1g.bin 生成完成"
          
          # 768MB内存版本
          dd if=/dev/zero of=bootargs_768m.bin bs=1M count=1 2>/dev/null
          printf 'model=mv100 console=ttyAMA0,115200 root=/dev/mmcblk0p9 rootfstype=ext4 rootwait rootflags=noload mem=768M mmz=ddr,0,0,48M vmalloc=500M systemd.unified_cgroup_hierarchy=1 systemd.mask=create-swapfile.service blkdevparts=mmcblk0:1M(boot),1M(bootargs),4M(baseparam),4M(pqparam),4M(logo),20M(kernel),64M(busybox),512M(backup),-(ubuntu)' | dd of=bootargs_768m.bin bs=1 conv=notrunc 2>/dev/null
          echo "✅ bootargs_768m.bin 生成完成"
          
          # 512MB内存版本
          dd if=/dev/zero of=bootargs_512m.bin bs=1M count=1 2>/dev/null
          printf 'model=mv100 console=ttyAMA0,115200 root=/dev/mmcblk0p9 rootfstype=ext4 rootwait rootflags=noload mem=512M mmz=ddr,0,0,32M vmalloc=500M systemd.unified_cgroup_hierarchy=1 systemd.mask=create-swapfile.service blkdevparts=mmcblk0:1M(boot),1M(bootargs),4M(baseparam),4M(pqparam),4M(logo),20M(kernel),64M(busybox),512M(backup),-(ubuntu)' | dd of=bootargs_512m.bin bs=1 conv=notrunc 2>/dev/null
          echo "✅ bootargs_512m.bin 生成完成"

      # ====================== 第七阶段：打包固件 ======================
      - name: Package final firmware
        run: |
          mkdir -p ${{ env.FIRMWARE_OUT }}
          
          # 复制内核
          if [ -f hi_kernel_new.bin ]; then
            cp hi_kernel_new.bin ${{ env.FIRMWARE_OUT }}/
            echo "✅ 已包含编译好的内核"
          elif [ -f kernel-artifact/hi_kernel_new.bin ]; then
            cp kernel-artifact/hi_kernel_new.bin ${{ env.FIRMWARE_OUT }}/
            echo "✅ 已包含预编译内核"
          else
            echo "❌ 未找到内核文件"
            exit 1
          fi
          
          # 复制根文件系统
          cp backup-32.raw ${{ env.FIRMWARE_OUT }}/
          
          # 复制所有版本的bootargs
          cp bootargs_*.bin ${{ env.FIRMWARE_OUT }}/
          
          # 执行自定义打包脚本（如果有）
          if [ -f scripts/package_firmware.sh ]; then
            chmod +x scripts/package_firmware.sh
            bash scripts/package_firmware.sh ${{ env.FIRMWARE_OUT }}/
          fi
          
          echo "=== 最终固件产物 ==="
          ls -lh ${{ env.FIRMWARE_OUT }}/

      # ====================== 第八阶段：上传固件 ======================
      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v6
        with:
          name: hi3798mv100-ubuntu24.04-4.4y-firmware
          path: ${{ env.FIRMWARE_OUT }}/
          retention-days: 30

      # ====================== 可选：自动创建Release ======================
      # - name: Create GitHub Release
      #   if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
      #   uses: softprops/action-gh-release@v6
      #   with:
      #     tag_name: ubuntu24.04-4.4y-${{ github.run_number }}
      #     name: Hi3798MV100 Ubuntu 24.04 + 4.4.y Kernel Build #${{ github.run_number }}
      #     files: ${{ env.FIRMWARE_OUT }}/*
      #   env:
      #     GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
