name: Build Full Firmware (Ubuntu 24.04 LTS + 4.4.y Kernel)
on:
  workflow_dispatch:
    inputs:
      kernel_artifact:
        description: 'Kernel build artifact name (empty = build kernel too)'
        required: false
        default: ''

concurrency:
  group: firmware-build-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  build-firmware:
    runs-on: ubuntu-22.04
    timeout-minutes: 240
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      NODE_OPTIONS: "--no-deprecation"
      SDK_REPO: "https://gitee.com/lh736/HiSTBLinuxV100R005C00SPC060.git"
      SDK_DIR: "HiSTBLinuxV100R005C00SPC060"
      KERNEL_VERSION: "4.4.35"
      FIRMWARE_OUT: "firmware_output"
      ROOTFS_DIR: "ubuntu-noble-armhf-rootfs"
      ROOTFS_IMG: "backup-32.raw"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Cache SDK and apt packages
        uses: actions/cache@v5
        with:
          path: |
            ${{ env.SDK_DIR }}
            ~/.cache/apt
          key: ${{ github.job }}-sdk-apt-v17-${{ hashFiles('.github/workflows/build-firmware.yml') }}
      
      # 安装编译依赖
      - name: Install all build dependencies
        run: |
          sudo sed -i 's/archive.ubuntu.com/mirrors.huaweicloud.com/g' /etc/apt/sources.list
          sudo sed -i 's/security.ubuntu.com/mirrors.huaweicloud.com/g' /etc/apt/sources.list
          sudo apt update
          
          sudo apt install -y \
            build-essential make gettext bison flex bc zlib1g-dev libncurses5-dev \
            lzma u-boot-tools device-tree-compiler git cpio \
            python3 python3-pyelftools libssl-dev wget \
            qemu-user-static debootstrap binfmt-support e2fsprogs \
            lib32z1 lib32stdc++6 lib32gcc-s1 libc6-i386 dosfstools kmod
          
          sudo rm -f /var/cache/apt/archives/lock
          sudo rm -rf /var/cache/apt/archives/partial
          sudo apt clean

      # 构建 Ubuntu 24.04 armhf 根文件系统
      - name: Build Ubuntu 24.04 Noble armhf RootFS
        run: |
          echo "=== 开始构建Ubuntu 24.04根文件系统 ==="
          sudo debootstrap --arch=armhf --foreign --components=main,restricted,universe,multiverse noble ./${{ env.ROOTFS_DIR }} http://mirrors.huaweicloud.com/ubuntu-ports/
          
          sudo cp /usr/bin/qemu-arm-static ./${{ env.ROOTFS_DIR }}/usr/bin/
          sudo chroot ${ROOTFS_DIR} /debootstrap/debootstrap --second-stage
          
          sudo mount -t proc /proc ${ROOTFS_DIR}/proc
          sudo mount -t sysfs /sys ${ROOTFS_DIR}/sys
          
          sudo tee ${ROOTFS_DIR}/etc/apt/sources.list << 'EOF'
          deb https://mirrors.huaweicloud.com/ubuntu-ports/ noble main restricted universe multiverse
          deb https://mirrors.huaweicloud.com/ubuntu-ports/ noble-updates main restricted universe multiverse
          deb https://mirrors.huaweicloud.com/ubuntu-ports/ noble-security main restricted universe multiverse
          deb https://mirrors.huaweicloud.com/ubuntu-ports/ noble-backports main restricted universe multiverse
          EOF
          
          sudo chroot ${ROOTFS_DIR} apt-get update -y
          sudo chroot ${ROOTFS_DIR} apt-get install -y --no-install-recommends --fix-missing \
            systemd openssh-server iproute2 net-tools iputils-ping \
            vim nano curl wget htop sudo lsb-release procps \
            ca-certificates gnupg lsb-release dnsutils lsof rsync \
            unzip zip xz-utils tree
          
          sudo chroot ${ROOTFS_DIR} /bin/bash -c 'echo "root:123456" | chpasswd'
          
          sudo sed -i 's/^#PermitRootLogin prohibit-password/PermitRootLogin yes/' ${ROOTFS_DIR}/etc/ssh/sshd_config
          sudo sed -i 's/^#PasswordAuthentication yes/PasswordAuthentication yes/' ${ROOTFS_DIR}/etc/ssh/sshd_config
          sudo chroot ${ROOTFS_DIR} systemctl enable ssh
          
          sudo mkdir -p ${ROOTFS_DIR}/etc/netplan/
          sudo tee ${ROOTFS_DIR}/etc/netplan/01-netcfg.yaml << 'EOF'
          network:
            version: 2
            renderer: networkd
            ethernets:
              eth0:
                dhcp4: true
                macaddress: BC:25:E0:3F:F1:D9
          EOF
          sudo chroot ${ROOTFS_DIR} systemctl enable systemd-networkd
          sudo chroot ${ROOTFS_DIR} systemctl enable systemd-resolved
          
          sudo chroot ${ROOTFS_DIR} /bin/bash -c '
            export TZ=Asia/Shanghai
            ln -sf /usr/share/zoneinfo/Asia/Shanghai /etc/localtime
            echo "Asia/Shanghai" > /etc/timezone
            dpkg-reconfigure -f noninteractive tzdata
          '
          
          echo "hi3798mv100" | sudo tee ${ROOTFS_DIR}/etc/hostname
          echo "127.0.0.1   localhost hi3798mv100" | sudo tee ${ROOTFS_DIR}/etc/hosts
          
          echo "nameserver 223.5.5.5" | sudo tee ${ROOTFS_DIR}/etc/resolv.conf
          echo "nameserver 119.29.29.29" | sudo tee -a ${ROOTFS_DIR}/etc/resolv.conf
          
          sudo tee ${ROOTFS_DIR}/etc/sysctl.d/99-docker.conf << 'EOF'
          net.ipv4.ip_forward=1
          net.bridge.bridge-nf-call-iptables=1
          net.bridge.bridge-nf-call-ip6tables=1
          net.ipv4.conf.all.forwarding=1
          net.ipv4.conf.default.forwarding=1
          vm.swappiness=0
          vm.overcommit_memory=1
          EOF
          
          sudo mkdir -p ${ROOTFS_DIR}/etc/docker
          sudo tee ${ROOTFS_DIR}/etc/docker/daemon.json << 'EOF'
          {
            "log-driver": "json-file",
            "log-opts": {
              "max-size": "10m",
              "max-file": "3"
            },
            "exec-opts": ["native.cgroupdriver=systemd"],
            "storage-driver": "overlay2",
            "registry-mirrors": [
              "https://docker.mirrors.aliyun.com"
            ]
          }
          EOF
          
          sudo mkdir -p ${ROOTFS_DIR}/etc/apt/keyrings
          sudo wget -qO ${ROOTFS_DIR}/etc/apt/keyrings/docker.asc \
            https://mirrors.aliyun.com/docker-ce/linux/ubuntu/gpg
          sudo chmod a+r ${ROOTFS_DIR}/etc/apt/keyrings/docker.asc
          echo "deb [arch=armhf signed-by=/etc/apt/keyrings/docker.asc] https://mirrors.aliyun.com/docker-ce/linux/ubuntu noble stable" | \
            sudo tee ${ROOTFS_DIR}/etc/apt/sources.list.d/docker.list > /dev/null
          
          sudo chroot ${ROOTFS_DIR} apt-get clean
          sudo rm -rf ${ROOTFS_DIR}/var/lib/apt/lists/*
          sudo rm -rf ${ROOTFS_DIR}/tmp/* ${ROOTFS_DIR}/var/tmp/*
          sudo rm -rf ${ROOTFS_DIR}/usr/share/doc/* ${ROOTFS_DIR}/usr/share/man/*
          
          sudo umount ${ROOTFS_DIR}/proc
          sudo umount ${ROOTFS_DIR}/sys
          
          SIZE=$(sudo du -sm ${ROOTFS_DIR} | cut -f1)
          IMAGE_SIZE=$((SIZE + 200))
          echo "根文件系统大小: ${SIZE}MB, 创建镜像大小: ${IMAGE_SIZE}MB"
          
          dd if=/dev/zero of=${{ env.ROOTFS_IMG }} bs=1M count=$IMAGE_SIZE status=progress
          mkfs.ext4 -F ${{ env.ROOTFS_IMG }}
          
          sudo mkdir -p /mnt/temp
          sudo mount ${{ env.ROOTFS_IMG }} /mnt/temp
          sudo cp -a ${ROOTFS_DIR}/. /mnt/temp/
          sudo umount /mnt/temp
          
          e2fsck -f -y ${{ env.ROOTFS_IMG }} || true
          resize2fs -M ${{ env.ROOTFS_IMG }} || true
          
          echo "✅ Ubuntu 24.04根文件系统构建完成"
          echo "最终镜像大小: $(du -h ${{ env.ROOTFS_IMG }} | cut -f1)"

      # 纯原生HiSTBLinuxKernel仓库编译 4.4.y 内核（无外部源码、纯SDK原生流程）
      - name: Build 4.4.y kernel by native HiSTBLinux SDK
        if: github.event.inputs.kernel_artifact == ''
        run: |
          set -e
          WORKSPACE=${{ github.workspace }}
          SDK_FULL="${WORKSPACE}/${{ env.SDK_DIR }}"

          LS=/bin/ls
          CP=/bin/cp
          ECHO=/bin/echo
          FIND=/usr/bin/find
          RM=/bin/rm
          WHICH=/usr/bin/which

          $ECHO "=== 1. 拉取/更新原生SDK仓库 ==="
          if [ ! -d "${SDK_FULL}" ]; then
            git clone --depth 1 ${{ env.SDK_REPO }} ${{ env.SDK_DIR }}
          else
            cd "${SDK_FULL}" && git pull || true
          fi
          cd "${WORKSPACE}"

          $ECHO "=== 2. 进入SDK目录，加载环境变量并导出全局工具链路径 ==="
          cd "${SDK_FULL}"
          # 加载SDK环境脚本
          source env.sh
          # 提取交叉编译器路径，全局写入PATH，解决子make找不到编译器
          TOOLCHAIN_BIN=$(echo "$PATH" | tr ':' '\n' | grep prebuilts/toolchains/arm-histbv310-linux/bin | head -1)
          export PATH="${TOOLCHAIN_BIN}:$PATH"
          export CROSS_COMPILE=arm-histbv310-linux-

          $ECHO "=== 3. 校验交叉编译器 ==="
          if which arm-histbv310-linux-gcc; then
            $ECHO "✅ 交叉编译器就绪: $(arm-histbv310-linux-gcc --version)"
          else
            $ECHO "❌ 未找到海思交叉编译器，请检查SDK工具链完整性"
            exit 1
          fi

          $ECHO "=== 4. 【Linux官方规范】make mrproper 清理编译残留 ==="
          make mrproper
          $ECHO "mrproper 清理完成"

          $ECHO "=== 5. 启动SDK原生编译 make linux -j$(nproc) ==="
          make linux -j$(nproc)

          $ECHO "=== 6. 拷贝内核镜像到工作目录 ==="
          KERNEL_BIN="out/hi3798mv100/hi3798mdmo1g/image/emmc_image/hi_kernel.bin"
          if [ -f "${KERNEL_BIN}" ]; then
            $CP "${KERNEL_BIN}" "${WORKSPACE}/hi_kernel_new.bin"
            $ECHO "✅ 内核镜像拷贝成功: $(du -h "${WORKSPACE}/hi_kernel_new.bin" | cut -f1)"
          else
            $ECHO "❌ 内核镜像生成失败"
            exit 1
          fi

          $ECHO "=== 7. 检索内核模块目录 ==="
          MODULES_DIR=$(find out -type d -path "*lib/modules" | head -1)
          if [ -n "${MODULES_DIR}" ] && [ -d "${MODULES_DIR}" ]; then
            echo "MODULES_DIR=${SDK_FULL}/${MODULES_DIR}" >> $GITHUB_ENV
            $ECHO "✅ 内核模块目录: ${SDK_FULL}/${MODULES_DIR}"
          else
            $ECHO "⚠️ 未检索到内核模块目录"
          fi

          $LS -la out/hi3798mv100/hi3798mdmo1g/

      # 下载预编译内核（可选）
      - name: Download prebuilt kernel artifact
        if: github.event.inputs.kernel_artifact != ''
        uses: actions/download-artifact@v6
        with:
          name: ${{ github.event.inputs.kernel_artifact }}
          path: kernel-artifact/

      # 生成多版本 bootargs
      - name: Generate multi-version bootargs (1G/768M/512M)
        run: |
          echo "=== 生成所有内存版本的bootargs ==="
          dd if=/dev/zero of=bootargs_1g.bin bs=1M count=1 2>/dev/null
          printf 'model=mv100 console=ttyAMA0,115200 root=/dev/mmcblk0p9 rootfstype=ext4 rootwait rootflags=noload mem=1G mmz=ddr,0,0,60M vmalloc=500M systemd.unified_cgroup_hierarchy=1 blkdevparts=mmcblk0:1M(boot),1M(bootargs),4M(baseparam),4M(pqparam),4M(logo),20M(kernel),64M(busybox),512M(backup),-(ubuntu)' | dd of=bootargs_1g.bin bs=1 conv=notrunc 2>/dev/null
          echo "✅ bootargs_1g.bin 生成完成"
          
          dd if=/dev/zero of=bootargs_768m.bin bs=1M count=1 2>/dev/null
          printf 'model=mv100 console=ttyAMA0,115200 root=/dev/mmcblk0p9 rootfstype=ext4 rootwait rootflags=noload mem=768M mmz=ddr,0,0,48M vmalloc=500M systemd.unified_cgroup_hierarchy=1 blkdevparts=mmcblk0:1M(boot),1M(bootargs),4M(baseparam),4M(pqparam),4M(logo),20M(kernel),64M(busybox),512M(backup),-(ubuntu)' | dd of=bootargs_768m.bin bs=1 conv=notrunc 2>/dev/null
          echo "✅ bootargs_768m.bin 生成完成"
          
          dd if=/dev/zero of=bootargs_512m.bin bs=1M count=1 2>/dev/null
          printf 'model=mv100 console=ttyAMA0,115200 root=/dev/mmcblk0p9 rootfstype=ext4 rootwait rootflags=noload mem=512M mmz=ddr,0,0,32M vmalloc=500M systemd.unified_cgroup_hierarchy=1 blkdevparts=mmcblk0:1M(boot),1M(bootargs),4M(baseparam),4M(pqparam),4M(logo),20M(kernel),64M(busybox),512M(backup),-(ubuntu)' | dd of=bootargs_512m.bin bs=1 conv=notrunc 2>/dev/null
          echo "✅ bootargs_512m.bin 生成完成"

      # 内核模块集成进根文件系统
      - name: Integrate kernel modules into RootFS
        run: |
          echo "=== 集成内核模块到根文件系统 ==="
          sudo mkdir -p /mnt/rootfs
          sudo mount -o loop ${{ env.ROOTFS_IMG }} /mnt/rootfs
          
          if [ -n "${{ env.MODULES_DIR }}" ] && [ -d "${{ env.MODULES_DIR }}" ]; then
            echo "使用SDK生成的内核模块: ${{ env.MODULES_DIR }}"
            sudo cp -a ${{ env.MODULES_DIR }}/* /mnt/rootfs/lib/modules/
            KERNEL_VERSION=$(ls /mnt/rootfs/lib/modules/)
            echo "检测到内核版本: $KERNEL_VERSION"
            sudo depmod -a -b /mnt/rootfs "$KERNEL_VERSION"
            echo "✅ 内核模块集成完成"
          else
            echo "⚠️ 未找到内核模块目录，跳过模块集成"
          fi
          
          sudo tee /mnt/rootfs/usr/local/bin/first_boot_fix.sh << 'EOF'
          #!/bin/sh
          swapoff -a; sed -i '/swap/d' /etc/fstab; rm -rf /swapfile
          dd if=/dev/zero of=/dev/mmcblk0p2 bs=1M count=1
          # 自动检测内存并设置bootargs
          MEM_SIZE=$(free -m | awk '/^Mem:/{print $2}')
          if [ $MEM_SIZE -gt 700 ]; then
            MMZ_SIZE=60M
            MEM_PARAM=mem=1G
          elif [ $MEM_SIZE -gt 450 ]; then
            MMZ_SIZE=48M
            MEM_PARAM=mem=768M
          else
            MMZ_SIZE=32M
            MEM_PARAM=mem=512M
          fi
          printf "model=mv100 console=ttyAMA0,115200 root=/dev/mmcblk0p9 rootfstype=ext4 rootwait rootflags=noload $MEM_PARAM mmz=ddr,0,0,$MMZ_SIZE vmalloc=500M systemd.unified_cgroup_hierarchy=1 blkdevparts=mmcblk0:1M(boot),1M(bootargs),4M(baseparam),4M(pqparam),4M(logo),20M(kernel),64M(busybox),512M(backup),-(ubuntu)"|dd of=/dev/mmcblk0p2 bs=1 conv=notrunc
          chattr -i /etc/resolv.conf;echo -e 'nameserver 223.5.5.5\nnameserver 119.29.29.29'>/etc/resolv.conf;chattr +i /etc/resolv.conf
          mkdir -p /etc/apt/apt.conf.d;echo 'APT::Sandbox::Seccomp "false";'>/etc/apt/apt.conf.d/99no-seccomp
          sync;resize2fs /dev/mmcblk0p9
          touch /etc/first-boot-completed
          sleep 3;reboot
          EOF
          sudo chmod +x /mnt/rootfs/usr/local/bin/first_boot_fix.sh
          
          sudo tee /mnt/rootfs/etc/systemd/system/first-boot-fix.service << 'EOF'
          [Unit]
          Description=Hi3798MV100首次启动修复
          Before=multi-user.target
          ConditionPathExists=!/etc/first-boot-completed
          [Service]
          Type=oneshot
          ExecStart=/usr/local/bin/first_boot_fix.sh
          RemainAfterExit=yes
          [Install]
          WantedBy=multi-user.target
          EOF
          sudo ln -sf /etc/systemd/system/first-boot-fix.service \
            /mnt/rootfs/etc/systemd/system/multi-user.target.wants/
          
          sudo umount /mnt/rootfs
          echo "✅ 根文件系统集成完成"

      # 打包最终固件
      - name: Package final firmware
        run: |
          mkdir -p ${{ env.FIRMWARE_OUT }}
          
          if [ -f hi_kernel_new.bin ]; then
            cp hi_kernel_new.bin ${{ env.FIRMWARE_OUT }}/
            echo "✅ 已包含编译好的内核"
          elif [ -f kernel-artifact/hi_kernel_new.bin ]; then
            cp kernel-artifact/hi_kernel_new.bin ${{ env.FIRMWARE_OUT }}/
            echo "✅ 已包含预编译内核"
          else
            echo "❌ 未找到内核文件"
            exit 1
          fi
          
          cp ${{ env.ROOTFS_IMG }} ${{ env.FIRMWARE_OUT }}/
          cp bootargs_*.bin ${{ env.FIRMWARE_OUT }}/
          
          if [ -f scripts/package_firmware.sh ]; then
            chmod +x scripts/package_firmware.sh
            bash scripts/package_firmware.sh ${{ env.FIRMWARE_OUT }}/
          fi
          
          echo "=== 最终固件产物列表 ==="
          ls -lh ${{ env.FIRMWARE_OUT }}/

      # 上传固件制品
      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v6
        with:
          name: hi3798mv100-ubuntu24.04-4.4y-full-firmware
          path: ${{ env.FIRMWARE_OUT }}/
          retention-days: 30
