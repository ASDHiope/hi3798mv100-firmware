name: Build Kernel

on:
  push:
    branches: [main, master]
    paths:
      - 'dts/**'
      - 'configs/**'
      - 'scripts/build_kernel.sh'
      - '.github/workflows/build-kernel.yml'
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      sdk_repo:
        description: 'HiSTBLinux SDK repository URL'
        required: false
        default: 'https://gitee.com/lh736/HiSTBLinuxV100R005C00SPC060.git'
      sdk_branch:
        description: 'SDK branch/tag'
        required: false
        default: 'master'

jobs:
  build-kernel:
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential gcc-arm-linux-gnueabihf \
            binutils-arm-linux-gnueabihf cpp-arm-linux-gnueabihf \
            make gettext bison flex bc zlib1g-dev libncurses5-dev \
            lzma u-boot-tools device-tree-compiler git cpio \
            python3 python3-pyelftools libssl-dev wget

      - name: Clone HiSTBLinux SDK
        run: |
          git clone --depth 1 \
            ${{ github.event.inputs.sdk_repo || 'https://gitee.com/lh736/HiSTBLinuxV100R005C00SPC060.git' }} \
            HiSTBLinuxV100R005C00SPC060 || {
              echo "Gitee clone failed, trying GitHub mirror..."
              git clone --depth 1 \
                https://github.com/wdznb/EC6108V9C_HiSTBLinuxV100R005C00SPC060.git \
                HiSTBLinuxV100R005C00SPC060
            }

      - name: Fix SDK missing files
        run: |
          KERNEL_VERSION="4.4.35"
          SDK_KERNEL="HiSTBLinuxV100R005C00SPC060/source/kernel/linux-4.4.y"

          if [ ! -d "${SDK_KERNEL}/scripts/basic" ] || [ ! -d "${SDK_KERNEL}/scripts/kconfig" ]; then
            echo "Downloading Linux ${KERNEL_VERSION} for missing scripts..."
            wget -q "https://mirrors.edge.kernel.org/pub/linux/kernel/v4.x/linux-${KERNEL_VERSION}.tar.gz"
            tar xzf "linux-${KERNEL_VERSION}.tar.gz"

            [ ! -d "${SDK_KERNEL}/scripts/basic" ] && cp -r "linux-${KERNEL_VERSION}/scripts/basic/" "${SDK_KERNEL}/scripts/"
            [ ! -d "${SDK_KERNEL}/scripts/kconfig" ] && cp -r "linux-${KERNEL_VERSION}/scripts/kconfig/" "${SDK_KERNEL}/scripts/"
          fi

      - name: Copy custom DTS
        run: |
          SDK_KERNEL="HiSTBLinuxV100R005C00SPC060/source/kernel/linux-4.4.y"
          DTS_DIR="${SDK_KERNEL}/arch/arm/boot/dts"

          if [ -f "dts/hi3798mv100.dts" ]; then
            cp dts/hi3798mv100.dts "${DTS_DIR}/"
            echo "Custom DTS copied"

            if grep -q "hi3798mv100.dts" "${DTS_DIR}/Makefile" 2>/dev/null; then
              echo "DTS already in Makefile"
            else
              echo "dtb-\$(CONFIG_ARCH_HI3798MV100) += hi3798mv100.dtb" >> "${DTS_DIR}/Makefile"
              echo "DTS added to Makefile"
            fi
          fi

      - name: Configure SDK
        run: |
          cd HiSTBLinuxV100R005C00SPC060
          if [ -f "configs/hi3798mv100/hi3798mdmo1g_hi3798mv100_cfg.mak" ]; then
            cp configs/hi3798mv100/hi3798mdmo1g_hi3798mv100_cfg.mak cfg.mak
            echo "Configured for hi3798mdmo1g (1GB RAM)"
          else
            echo "Warning: cfg.mak template not found, listing available configs:"
            find configs/ -name "*hi3798*" -type f 2>/dev/null || true
            exit 1
          fi

      - name: Fix kernel config for original firmware compatibility
        run: |
          SDK_KERNEL="HiSTBLinuxV100R005C00SPC060/source/kernel/linux-4.4.y"
          SDK_CFG="HiSTBLinuxV100R005C00SPC060/out/hi3798mv100/hi3798mdmo1g/obj/source/kernel/linux-4.4.y"

          echo "=== Fix 1: Kernel version string ==="
          echo "Original kernel: 4.4.35_ecoo_81082668"
          echo "SDK default: 4.4.35_s40"
          echo ""
          echo "Setting CONFIG_LOCALVERSION to match original firmware..."
          echo "CONFIG_LOCALVERSION=\"_ecoo_81082668\"" >> "${SDK_KERNEL}/.config" 2>/dev/null || true

          echo ""
          echo "=== Fix 2: Memory configuration ==="
          echo "Original bootargs: mem=1G mmz=ddr,0,0,60M"
          echo "SDK default: mem=512M mmz=ddr,0,0,48M"
          echo ""

          echo "Fixing bootargs in SDK board config..."
          BOARD_CFG="${SDK_KERNEL}/arch/arm/configs/hi3798mv100_defconfig"
          if [ -f "$BOARD_CFG" ]; then
            sed -i 's/mem=512M/mem=1G/g' "$BOARD_CFG" 2>/dev/null || true
            sed -i 's/mem=384M/mem=1G/g' "$BOARD_CFG" 2>/dev/null || true
            sed -i 's/mem=768M/mem=1G/g' "$BOARD_CFG" 2>/dev/null || true
            sed -i 's/mmz=ddr,0,0,48M/mmz=ddr,0,0,60M/g' "$BOARD_CFG" 2>/dev/null || true
            sed -i 's/mmz=ddr,0,0,32M/mmz=ddr,0,0,60M/g' "$BOARD_CFG" 2>/dev/null || true
            echo "  Fixed defconfig"
          fi

          echo "Fixing bootargs in SDK common config..."
          for f in $(find HiSTBLinuxV100R005C00SPC060/ -name "*.cfg" -o -name "*.mak" -o -name "*.config" 2>/dev/null | head -50); do
            if grep -q "mem=512M\|mem=384M\|mmz=ddr,0,0,48M\|mmz=ddr,0,0,32M" "$f" 2>/dev/null; then
              echo "  Fixing $f"
              sed -i 's/mem=512M/mem=1G/g' "$f" 2>/dev/null || true
              sed -i 's/mem=384M/mem=1G/g' "$f" 2>/dev/null || true
              sed -i 's/mem=768M/mem=1G/g' "$f" 2>/dev/null || true
              sed -i 's/mmz=ddr,0,0,48M/mmz=ddr,0,0,60M/g' "$f" 2>/dev/null || true
              sed -i 's/mmz=ddr,0,0,32M/mmz=ddr,0,0,60M/g' "$f" 2>/dev/null || true
            fi
          done

          echo ""
          echo "=== Fix 3: DTS bootargs ==="
          DTS_FILE="${SDK_KERNEL}/arch/arm/boot/dts/hi3798mv100.dts"
          if [ -f "$DTS_FILE" ]; then
            echo "Ensuring DTS has correct bootargs..."
            sed -i 's/mem=512M/mem=1G/g' "$DTS_FILE" 2>/dev/null || true
            sed -i 's/mem=384M/mem=1G/g' "$DTS_FILE" 2>/dev/null || true
            sed -i 's/mmz=ddr,0,0,48M/mmz=ddr,0,0,60M/g' "$DTS_FILE" 2>/dev/null || true
            echo "  DTS bootargs fixed"
          fi

          echo ""
          echo "=== Verification ==="
          echo "Kernel version will be: $(grep CONFIG_LOCALVERSION ${SDK_KERNEL}/.config 2>/dev/null || echo 'not set yet')"
          echo "DTS bootargs: $(grep bootargs ${DTS_FILE} 2>/dev/null | head -1)"

          echo ""
          echo "=== Fix 4: Critical kernel config options ==="
          DEFCONFIG="${SDK_KERNEL}/arch/arm/configs/hi3798mv100_defconfig"
          if [ ! -f "$DEFCONFIG" ]; then
            DEFCONFIG=$(find ${SDK_KERNEL}/arch/arm/configs/ -name "*hi3798*" | head -1)
          fi

          if [ -f "$DEFCONFIG" ]; then
            echo "Patching defconfig: $DEFCONFIG"

            grep -q "CONFIG_DEVTMPFS=y" "$DEFCONFIG" || echo "CONFIG_DEVTMPFS=y" >> "$DEFCONFIG"
            grep -q "CONFIG_DEVTMPFS_MOUNT=y" "$DEFCONFIG" || echo "CONFIG_DEVTMPFS_MOUNT=y" >> "$DEFCONFIG"

            grep -q "CONFIG_TMPFS=y" "$DEFCONFIG" || echo "CONFIG_TMPFS=y" >> "$DEFCONFIG"

            grep -q "CONFIG_FUTEX=y" "$DEFCONFIG" || echo "CONFIG_FUTEX=y" >> "$DEFCONFIG"

            grep -q "CONFIG_EPOLL=y" "$DEFCONFIG" || echo "CONFIG_EPOLL=y" >> "$DEFCONFIG"

            grep -q "CONFIG_SIGNALFD=y" "$DEFCONFIG" || echo "CONFIG_SIGNALFD=y" >> "$DEFCONFIG"
            grep -q "CONFIG_TIMERFD=y" "$DEFCONFIG" || echo "CONFIG_TIMERFD=y" >> "$DEFCONFIG"
            grep -q "CONFIG_EVENTFD=y" "$DEFCONFIG" || echo "CONFIG_EVENTFD=y" >> "$DEFCONFIG"

            grep -q "CONFIG_INOTIFY_USER=y" "$DEFCONFIG" || echo "CONFIG_INOTIFY_USER=y" >> "$DEFCONFIG"

            grep -q "CONFIG_FHANDLE=y" "$DEFCONFIG" || echo "CONFIG_FHANDLE=y" >> "$DEFCONFIG"

            grep -q "CONFIG_MULTIUSER=y" "$DEFCONFIG" || echo "CONFIG_MULTIUSER=y" >> "$DEFCONFIG"

            grep -q "CONFIG_SYSFS=y" "$DEFCONFIG" || echo "CONFIG_SYSFS=y" >> "$DEFCONFIG"

            sed -i 's/# CONFIG_DEVTMPFS is not set/CONFIG_DEVTMPFS=y/' "$DEFCONFIG" 2>/dev/null || true
            sed -i 's/# CONFIG_DEVTMPFS_MOUNT is not set/CONFIG_DEVTMPFS_MOUNT=y/' "$DEFCONFIG" 2>/dev/null || true
            sed -i 's/# CONFIG_TMPFS is not set/CONFIG_TMPFS=y/' "$DEFCONFIG" 2>/dev/null || true
            sed -i 's/# CONFIG_FHANDLE is not set/CONFIG_FHANDLE=y/' "$DEFCONFIG" 2>/dev/null || true

            echo "  Critical config options added"
          else
            echo "  WARNING: defconfig not found, will patch .config after build starts"
          fi

      - name: Build kernel
        run: |
          cd HiSTBLinuxV100R005C00SPC060
          source env.sh

          SDK_OUT_KERNEL="out/hi3798mv100/hi3798mdmo1g/obj/source/kernel/linux-4.4.y"

          echo "=== Pre-build: Fix .config after SDK generates it ==="
          make linux -j$(nproc) 2>&1 | head -5 || true

          if [ -f "${SDK_OUT_KERNEL}/.config" ]; then
            echo "Fixing LOCALVERSION in output .config..."
            sed -i 's/CONFIG_LOCALVERSION=".*"/CONFIG_LOCALVERSION="_ecoo_81082668"/' "${SDK_OUT_KERNEL}/.config"
            sed -i 's/CONFIG_LOCALVERSION_AUTO=y/# CONFIG_LOCALVERSION_AUTO is not set/' "${SDK_OUT_KERNEL}/.config" 2>/dev/null || true
            echo "  LOCALVERSION set to _ecoo_81082668"

            echo "Ensuring critical config options in output .config..."
            sed -i 's/# CONFIG_DEVTMPFS is not set/CONFIG_DEVTMPFS=y/' "${SDK_OUT_KERNEL}/.config" 2>/dev/null || true
            sed -i 's/# CONFIG_DEVTMPFS_MOUNT is not set/CONFIG_DEVTMPFS_MOUNT=y/' "${SDK_OUT_KERNEL}/.config" 2>/dev/null || true
            sed -i 's/# CONFIG_TMPFS is not set/CONFIG_TMPFS=y/' "${SDK_OUT_KERNEL}/.config" 2>/dev/null || true
            sed -i 's/# CONFIG_FHANDLE is not set/CONFIG_FHANDLE=y/' "${SDK_OUT_KERNEL}/.config" 2>/dev/null || true
            grep -q "CONFIG_DEVTMPFS=y" "${SDK_OUT_KERNEL}/.config" || echo "CONFIG_DEVTMPFS=y" >> "${SDK_OUT_KERNEL}/.config"
            grep -q "CONFIG_DEVTMPFS_MOUNT=y" "${SDK_OUT_KERNEL}/.config" || echo "CONFIG_DEVTMPFS_MOUNT=y" >> "${SDK_OUT_KERNEL}/.config"
            grep -q "CONFIG_TMPFS=y" "${SDK_OUT_KERNEL}/.config" || echo "CONFIG_TMPFS=y" >> "${SDK_OUT_KERNEL}/.config"
            grep -q "CONFIG_FHANDLE=y" "${SDK_OUT_KERNEL}/.config" || echo "CONFIG_FHANDLE=y" >> "${SDK_OUT_KERNEL}/.config"
            echo "  Critical options ensured"
          fi

          echo "=== Continuing kernel build ==="
          make linux -j$(nproc) 2>&1 | tee build.log

      - name: Prepare artifacts
        run: |
          mkdir -p output
          SDK_OUT="HiSTBLinuxV100R005C00SPC060/out/hi3798mv100/hi3798mdmo1g/image/emmc_image"

          if [ -f "${SDK_OUT}/hi_kernel.bin" ]; then
            cp "${SDK_OUT}/hi_kernel.bin" output/hi_kernel_new.bin
            echo "Kernel image found"
          else
            echo "Searching for kernel image..."
            find HiSTBLinuxV100R005C00SPC060/out/ -name "hi_kernel*" -type f 2>/dev/null || true
            find HiSTBLinuxV100R005C00SPC060/source/kernel/ -name "uImage" -type f 2>/dev/null || true
            find HiSTBLinuxV100R005C00SPC060/source/kernel/ -name "zImage" -type f 2>/dev/null || true
            echo "ERROR: Kernel image not found in expected location"
            exit 1
          fi

          echo "=== Verifying kernel version string ==="
          strings output/hi_kernel_new.bin | grep "4.4.35" | head -5 || true
          if strings output/hi_kernel_new.bin | grep -q "4.4.35_ecoo"; then
            echo "OK: Kernel version matches original firmware (4.4.35_ecoo_81082668)"
          else
            echo "WARNING: Kernel version does NOT match original firmware!"
            echo "HiSilicon KO modules may not load. Expected: 4.4.35_ecoo_81082668"
          fi

          if [ -f "${SDK_OUT}/hi3798mv100.dtb" ]; then
            cp "${SDK_OUT}/hi3798mv100.dtb" output/
          fi

          DTB_FIND=$(find HiSTBLinuxV100R005C00SPC060/source/kernel/linux-4.4.y/arch/arm/boot/dts/ -name "hi3798mv100.dtb" 2>/dev/null | head -1)
          if [ -n "$DTB_FIND" ]; then
            cp "$DTB_FIND" output/hi3798mv100.dtb
          fi

          cp HiSTBLinuxV100R005C00SPC060/build.log output/ 2>/dev/null || true

      - name: Upload kernel artifact
        uses: actions/upload-artifact@v4
        with:
          name: hi3798mv100-kernel
          path: output/
          retention-days: 30

      - name: Build summary
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Device | Hi3798MV100 mdmo1g |" >> $GITHUB_STEP_SUMMARY
          echo "| Kernel | Linux 4.4.35_ecoo |" >> $GITHUB_STEP_SUMMARY
          echo "| SDK | HiSTBLinuxV100R005C00SPC060 |" >> $GITHUB_STEP_SUMMARY
          echo "| RAM | 1GB |" >> $GITHUB_STEP_SUMMARY
          echo "| GPU | Mali-450 MP6 |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Output Files" >> $GITHUB_STEP_SUMMARY
          ls -lh output/ >> $GITHUB_STEP_SUMMARY 2>/dev/null || true
