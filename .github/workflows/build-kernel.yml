name: Build Kernel

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-22.04
    timeout-minutes: 90
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential gcc-arm-linux-gnueabihf \
            binutils-arm-linux-gnueabihf cpp-arm-linux-gnueabihf \
            make gettext bison flex bc zlib1g-dev libncurses5-dev \
            lzma u-boot-tools device-tree-compiler git cpio \
            python3 python3-pyelftools libssl-dev wget

      - name: Clone HiSTBLinux SDK
        run: |
          git clone --depth 1 \
            https://gitee.com/lh736/HiSTBLinuxV100R005C00SPC060.git \
            HiSTBLinuxV100R005C00SPC060 || {
              echo "Gitee clone failed, trying GitHub mirror..."
              git clone --depth 1 \
                https://github.com/wdznb/EC6108V9C_HiSTBLinuxV100R005C00SPC060.git \
                HiSTBLinuxV100R005C00SPC060
            }

      - name: Patch defconfig and build kernel
        run: |
          cd HiSTBLinuxV100R005C00SPC060

          echo "=== Patch ALL hi3798mv100 defconfig files ==="
          for DEFCONFIG in $(find . -name "*hi3798mv100*defconfig*" -path "*/arm/*" -type f 2>/dev/null); do
            echo "Patching: $DEFCONFIG"
            sed -i 's/CONFIG_LOCALVERSION="_s40"/CONFIG_LOCALVERSION="_ecoo_81082668"/' "$DEFCONFIG"
            sed -i 's/CONFIG_LOCALVERSION_AUTO=y/# CONFIG_LOCALVERSION_AUTO is not set/' "$DEFCONFIG"
            if ! grep -q 'CONFIG_LOCALVERSION=' "$DEFCONFIG"; then
              echo 'CONFIG_LOCALVERSION="_ecoo_81082668"' >> "$DEFCONFIG"
            fi
            sed -i 's/# CONFIG_DEVTMPFS is not set/CONFIG_DEVTMPFS=y/' "$DEFCONFIG"
            if ! grep -q "CONFIG_DEVTMPFS=y" "$DEFCONFIG"; then
              echo "CONFIG_DEVTMPFS=y" >> "$DEFCONFIG"
            fi
            if ! grep -q "CONFIG_DEVTMPFS_MOUNT=y" "$DEFCONFIG"; then
              echo "CONFIG_DEVTMPFS_MOUNT=y" >> "$DEFCONFIG"
            fi
            for opt in CGROUPS CGROUP_FREEZER CGROUP_DEVICE CGROUP_CPUACCT CGROUP_SCHED CGROUP_PIDS MEMCG BLK_CGROUP CPUSETS; do
              sed -i "s/# CONFIG_${opt} is not set/CONFIG_${opt}=y/" "$DEFCONFIG"
              if ! grep -q "CONFIG_${opt}=y" "$DEFCONFIG"; then
                echo "CONFIG_${opt}=y" >> "$DEFCONFIG"
              fi
            done
            for opt in TMPFS POSIX_MQUEUE SIGNALFD TIMERFD EVENTFD EPOLL FUTEX INOTIFY_USER FHANDLE SYSFS; do
              sed -i "s/# CONFIG_${opt} is not set/CONFIG_${opt}=y/" "$DEFCONFIG"
              if ! grep -q "CONFIG_${opt}=y" "$DEFCONFIG"; then
                echo "CONFIG_${opt}=y" >> "$DEFCONFIG"
              fi
            done
            echo "  LOCALVERSION: $(grep CONFIG_LOCALVERSION= "$DEFCONFIG")"
            echo "  DEVTMPFS: $(grep CONFIG_DEVTMPFS "$DEFCONFIG" | head -2)"
            echo "  CGROUPS: $(grep CONFIG_CGROUPS "$DEFCONFIG" | head -2)"
            echo "  TMPFS: $(grep CONFIG_TMPFS "$DEFCONFIG" | head -1)"
          done

          echo ""
          echo "=== Fix SDK missing scripts and copy DTS ==="
          KERNEL_VERSION="4.4.35"
          SDK_KERNEL="source/kernel/linux-4.4.y"
          if [ ! -d "${SDK_KERNEL}/scripts/basic" ] || [ ! -d "${SDK_KERNEL}/scripts/kconfig" ]; then
            wget -q "https://mirrors.edge.kernel.org/pub/linux/kernel/v4.x/linux-${KERNEL_VERSION}.tar.gz"
            tar xzf "linux-${KERNEL_VERSION}.tar.gz"
            [ ! -d "${SDK_KERNEL}/scripts/basic" ] && cp -r "linux-${KERNEL_VERSION}/scripts/basic/" "${SDK_KERNEL}/scripts/"
            [ ! -d "${SDK_KERNEL}/scripts/kconfig" ] && cp -r "linux-${KERNEL_VERSION}/scripts/kconfig/" "${SDK_KERNEL}/scripts/"
          fi
          if [ -f "../dts/hi3798mv100.dts" ]; then
            cp ../dts/hi3798mv100.dts "${SDK_KERNEL}/arch/arm/boot/dts/"
            if ! grep -q "hi3798mv100.dts" "${SDK_KERNEL}/arch/arm/boot/dts/Makefile" 2>/dev/null; then
              echo "dtb-\$(CONFIG_ARCH_HI3798MV100) += hi3798mv100.dtb" >> "${SDK_KERNEL}/arch/arm/boot/dts/Makefile"
            fi
          fi

          echo ""
          echo "=== Build kernel with SDK ==="
          cp configs/hi3798mv100/hi3798mdmo1g_hi3798mv100_cfg.mak cfg.mak
          source env.sh
          make linux -j$(nproc) 2>&1 | tee /tmp/sdk_build.log | tail -10

          echo ""
          echo "=== Check kernel version ==="
          SDK_KERNEL_BIN="out/hi3798mv100/hi3798mdmo1g/image/emmc_image/hi_kernel.bin"
          if [ -f "$SDK_KERNEL_BIN" ] && strings "$SDK_KERNEL_BIN" | grep -q "4.4.35_ecoo"; then
            echo "OK: Version is 4.4.35_ecoo_81082668"
          else
            echo "Version is wrong, doing incremental fix..."
            echo ""

            OUT_DIR="out/hi3798mv100/hi3798mdmo1g/obj/source/kernel/linux-4.4.y"
            SDK_CROSS=$(grep -oP 'CROSS_COMPILE=\K\S+' /tmp/sdk_build.log 2>/dev/null | head -1)
            [ -z "$SDK_CROSS" ] && SDK_CROSS="arm-histbv310-linux-"
            echo "CROSS_COMPILE: $SDK_CROSS"

            TOOLCHAIN_BIN=$(find tools/ -name "arm-his*-linux" -type d 2>/dev/null | head -1)/bin
            echo "TOOLCHAIN_BIN: $TOOLCHAIN_BIN"
            export PATH="$TOOLCHAIN_BIN:$PATH"

            echo ""
            echo "Patching .config in out/ directory..."
            if [ -f "$OUT_DIR/.config" ]; then
              sed -i 's/CONFIG_LOCALVERSION=".*"/CONFIG_LOCALVERSION="_ecoo_81082668"/' "$OUT_DIR/.config"
              if ! grep -q 'CONFIG_LOCALVERSION=' "$OUT_DIR/.config"; then
                echo 'CONFIG_LOCALVERSION="_ecoo_81082668"' >> "$OUT_DIR/.config"
              fi
              sed -i 's/CONFIG_LOCALVERSION_AUTO=y/# CONFIG_LOCALVERSION_AUTO is not set/' "$OUT_DIR/.config"
              for opt in DEVTMPFS DEVTMPFS_MOUNT CGROUPS CGROUP_FREEZER CGROUP_DEVICE CGROUP_CPUACCT CGROUP_SCHED CGROUP_PIDS MEMCG BLK_CGROUP CPUSETS TMPFS POSIX_MQUEUE SIGNALFD TIMERFD EVENTFD EPOLL FUTEX INOTIFY_USER FHANDLE SYSFS; do
                sed -i "s/# CONFIG_${opt} is not set/CONFIG_${opt}=y/" "$OUT_DIR/.config"
                if ! grep -q "CONFIG_${opt}=y" "$OUT_DIR/.config"; then
                  echo "CONFIG_${opt}=y" >> "$OUT_DIR/.config"
                fi
              done
              echo "Patched .config:"
              grep "CONFIG_LOCALVERSION=" "$OUT_DIR/.config"
              grep "CONFIG_DEVTMPFS" "$OUT_DIR/.config"
            fi

            echo ""
            echo "Deleting cached version files..."
            rm -f "$OUT_DIR/include/config/kernel.release"
            rm -f "$OUT_DIR/include/generated/utsrelease.h"
            rm -f "$OUT_DIR/include/generated/compile.h"
            rm -f "$OUT_DIR/init/version.o"
            rm -f "$OUT_DIR/init/do_mounts.o"
            rm -f "$OUT_DIR/drivers/base/devtmpfs.o"

            echo ""
            echo "Incremental rebuild with O=..."
            make ARCH=arm CROSS_COMPILE=$SDK_CROSS O="$OUT_DIR" -j$(nproc) 2>&1 | tail -10
            make ARCH=arm CROSS_COMPILE=$SDK_CROSS O="$OUT_DIR" uImage 2>&1 || true

            echo ""
            echo "Verify after incremental rebuild:"
            if [ -f "$SDK_KERNEL_BIN" ]; then
              strings "$SDK_KERNEL_BIN" | grep "4.4.35" | head -5
              if strings "$SDK_KERNEL_BIN" | grep -q "4.4.35_ecoo"; then
                echo "OK: Version is 4.4.35_ecoo_81082668"
              else
                echo "FAIL: Version still wrong"
              fi
            fi
          fi

      - name: Build SDK sample programs and display init
        run: |
          cd HiSTBLinuxV100R005C00SPC060
          source env.sh

          TOOLCHAIN_BIN=$(find tools/ -name "arm-his*-linux" -type d 2>/dev/null | head -1)/bin
          export PATH="$TOOLCHAIN_BIN:$PATH"
          SDK_CROSS="arm-histbv310-linux-"
          echo "Using cross-compiler: ${SDK_CROSS}gcc"
          ${SDK_CROSS}gcc --version 2>/dev/null | head -1 || echo "Cross-compiler not found!"

          echo ""
          echo "=== Looking for SDK MPP headers ==="
          MSP_INC=""
          for d in $(find source -type d -name "include" 2>/dev/null); do
            if [ -f "$d/hi_comm_vo.h" ]; then
              MSP_INC="$d"
              echo "Found MPP headers: $d"
              break
            fi
          done
          if [ -z "$MSP_INC" ]; then
            echo "WARNING: MPP headers not found, searching broader..."
            find source -name "hi_comm_vo.h" 2>/dev/null
            find source -name "hi_mpi_vo.h" 2>/dev/null
            find source -name "hi_type.h" 2>/dev/null
          fi

          echo ""
          echo "=== Looking for SDK MPP libraries ==="
          OUT_DIR="out/hi3798mv100/hi3798mdmo1g"
          MSP_LIB=""
          for d in $(find "$OUT_DIR" -type d -name "lib" 2>/dev/null); do
            if ls "$d"/libhi_msp* 2>/dev/null >/dev/null; then
              MSP_LIB="$d"
              echo "Found MPP libs: $d"
              ls -lh "$d"/libhi_msp* 2>/dev/null
              break
            fi
          done
          if [ -z "$MSP_LIB" ]; then
            echo "Searching for libraries..."
            find "$OUT_DIR" -name "libhi_msp*" -o -name "libhi_vo*" -o -name "libhi_hdmi*" 2>/dev/null
            find source -name "libhi_msp*" -o -name "libhi_vo*" -o -name "libhi_hdmi*" 2>/dev/null
          fi

          echo ""
          echo "=== Building SDK sample programs ==="
          make sample -j$(nproc) 2>&1 | tail -20 || {
            echo "WARNING: make sample failed"
          }

          echo ""
          echo "=== Checking for sample binaries ==="
          find "$OUT_DIR" -name "sample_*" -type f -executable 2>/dev/null | head -20

          echo ""
          echo "=== Writing display init program ==="
          mkdir -p output/bin

          cat > /tmp/hi_display_init.c << 'INITEOF'
#include <stdio.h>
#include <stdlib.h>
#include <string.h>
#include <unistd.h>
#include <signal.h>
#include <fcntl.h>
#include <sys/ioctl.h>
#include <errno.h>
#include <dlfcn.h>

typedef int HI_S32;
typedef unsigned int HI_U32;
typedef char HI_CHAR;
typedef enum { HI_FALSE = 0, HI_TRUE = 1 } HI_BOOL;

#define HI_SUCCESS 0
#define VO_DEV_HD 0
#define VO_LAYER_VID 0
#define HDMI_ID_0 0

typedef enum {
    VO_INTF_CVBS = 0x01, VO_INTF_YPBPR = 0x02, VO_INTF_VGA = 0x04,
    VO_INTF_HDMI = 0x08, VO_INTF_BT656 = 0x10, VO_INTF_BT1120 = 0x20,
    VO_INTF_LCD = 0x40,
} VO_INTF_TYPE_E;

typedef enum {
    VO_OUTPUT_PAL = 0, VO_OUTPUT_NTSC = 1, VO_OUTPUT_1080P24 = 2,
    VO_OUTPUT_1080P25 = 3, VO_OUTPUT_1080P30 = 4, VO_OUTPUT_720P50 = 5,
    VO_OUTPUT_720P60 = 6, VO_OUTPUT_1080I50 = 7, VO_OUTPUT_1080I60 = 8,
    VO_OUTPUT_1080P50 = 9, VO_OUTPUT_1080P60 = 10, VO_OUTPUT_576P50 = 11,
    VO_OUTPUT_480P60 = 12,
} VO_INTF_SYNC_E;

typedef struct { HI_S32 s32X; HI_S32 s32Y; HI_U32 u32Width; HI_U32 u32Height; } RECT_S;
typedef struct { HI_U32 u32Width; HI_U32 u32Height; } SIZE_S;

typedef struct {
    VO_INTF_TYPE_E enIntfType;
    VO_INTF_SYNC_E enIntfSync;
    HI_U32 u32BgColor;
} VO_PUB_ATTR_S;

typedef struct {
    RECT_S stDispRect;
    SIZE_S stImageSize;
    HI_U32 u32DispFrmRt;
    HI_S32 enPixFormat;
} VO_VIDEO_LAYER_ATTR_S;

typedef enum {
    HDMI_VIDEO_FMT_1080P_60 = 0, HDMI_VIDEO_FMT_1080P_50,
    HDMI_VIDEO_FMT_1080P_30, HDMI_VIDEO_FMT_1080P_25,
    HDMI_VIDEO_FMT_1080P_24, HDMI_VIDEO_FMT_1080I_60,
    HDMI_VIDEO_FMT_1080I_50, HDMI_VIDEO_FMT_720P_60,
    HDMI_VIDEO_FMT_720P_50, HDMI_VIDEO_FMT_576P_50,
    HDMI_VIDEO_FMT_480P_60,
} HDMI_VIDEO_FMT_E;

typedef enum { HDMI_SOUND_INTF_I2S = 0, HDMI_SOUND_INTF_SPDIF } HDMI_SOUND_INTF_E;
typedef enum { HDMI_DEEP_COLOR_24BIT = 0, HDMI_DEEP_COLOR_30BIT, HDMI_DEEP_COLOR_36BIT } HDMI_DEEP_COLOR_E;
typedef enum { HDMI_SAMPLE_RATE_48K = 0, HDMI_SAMPLE_RATE_44K, HDMI_SAMPLE_RATE_32K } HDMI_SAMPLE_RATE_E;

typedef struct { HDMI_SAMPLE_RATE_E enSampleRate; HI_U8 u8BitDepth; } HDMI_SOUND_ATTR_S;

typedef struct {
    HDMI_VIDEO_FMT_E enVideoFmt;
    HDMI_VIDEO_FMT_E enVidOut;
    HDMI_SOUND_INTF_E enSoundIntf;
    HI_BOOL bEnable;
    HI_BOOL bAuthMode;
    HDMI_DEEP_COLOR_E enDeepColorMode;
    HDMI_SOUND_ATTR_S stSoundAttr;
} HDMI_ATTR_S;

typedef HI_S32 (*FN_SYS_Init)(void);
typedef HI_S32 (*FN_SYS_Exit)(void);
typedef HI_S32 (*FN_VO_SetPubAttr)(int, VO_PUB_ATTR_S*);
typedef HI_S32 (*FN_VO_Enable)(int);
typedef HI_S32 (*FN_VO_Disable)(int);
typedef HI_S32 (*FN_VO_SetVideoLayerAttr)(int, VO_VIDEO_LAYER_ATTR_S*);
typedef HI_S32 (*FN_VO_EnableVideoLayer)(int);
typedef HI_S32 (*FN_VO_DisableVideoLayer)(int);
typedef HI_S32 (*FN_HDMI_Open)(int);
typedef HI_S32 (*FN_HDMI_Close)(int);
typedef HI_S32 (*FN_HDMI_GetAttr)(int, HDMI_ATTR_S*);
typedef HI_S32 (*FN_HDMI_SetAttr)(int, HDMI_ATTR_S*);
typedef HI_S32 (*FN_HDMI_Start)(int);
typedef HI_S32 (*FN_HDMI_Stop)(int);

static volatile int g_run = 1;
void sig_handler(int sig) { g_run = 0; }

VO_INTF_SYNC_E get_vo_sync(const char *res) {
    if (!res || strcmp(res, "1080p60") == 0) return VO_OUTPUT_1080P60;
    if (strcmp(res, "1080p50") == 0) return VO_OUTPUT_1080P50;
    if (strcmp(res, "720p60") == 0) return VO_OUTPUT_720P60;
    if (strcmp(res, "720p50") == 0) return VO_OUTPUT_720P50;
    if (strcmp(res, "480p60") == 0) return VO_OUTPUT_480P60;
    if (strcmp(res, "576p50") == 0) return VO_OUTPUT_576P50;
    return VO_OUTPUT_1080P60;
}

HDMI_VIDEO_FMT_E get_hdmi_fmt(VO_INTF_SYNC_E sync) {
    switch (sync) {
        case VO_OUTPUT_1080P60: return HDMI_VIDEO_FMT_1080P_60;
        case VO_OUTPUT_1080P50: return HDMI_VIDEO_FMT_1080P_50;
        case VO_OUTPUT_720P60:  return HDMI_VIDEO_FMT_720P_60;
        case VO_OUTPUT_720P50:  return HDMI_VIDEO_FMT_720P_50;
        case VO_OUTPUT_480P60:  return HDMI_VIDEO_FMT_480P_60;
        case VO_OUTPUT_576P50:  return HDMI_VIDEO_FMT_576P_50;
        default: return HDMI_VIDEO_FMT_1080P_60;
    }
}

void get_resolution(VO_INTF_SYNC_E sync, HI_U32 *w, HI_U32 *h) {
    switch (sync) {
        case VO_OUTPUT_1080P60: case VO_OUTPUT_1080P50: *w=1920; *h=1080; break;
        case VO_OUTPUT_720P60:  case VO_OUTPUT_720P50:  *w=1280; *h=720;  break;
        case VO_OUTPUT_480P60:  *w=720;  *h=480;  break;
        case VO_OUTPUT_576P50:  *w=720;  *h=576;  break;
        default: *w=1920; *h=1080; break;
    }
}

int main(int argc, char *argv[])
{
    const char *resolution = (argc > 1) ? argv[1] : "1080p60";
    int daemon_mode = (argc > 2 && strcmp(argv[2], "-d") == 0);

    printf("Hi3798MV100 Display Init - Resolution: %s\n", resolution);

    signal(SIGINT, sig_handler);
    signal(SIGTERM, sig_handler);

    void *lib_msp = dlopen("libhi_msp.so", RTLD_NOW);
    if (!lib_msp) {
        lib_msp = dlopen("/usr/lib/libhi_msp.so", RTLD_NOW);
    }
    if (!lib_msp) {
        lib_msp = dlopen("/opt/hisilicon/lib/libhi_msp.so", RTLD_NOW);
    }
    if (!lib_msp) {
        printf("ERROR: Cannot load libhi_msp.so: %s\n", dlerror());
        printf("Please install SDK libraries to /usr/lib/ or /opt/hisilicon/lib/\n");
        return 1;
    }
    printf("Loaded libhi_msp.so\n");

    FN_SYS_Init pSYS_Init = (FN_SYS_Init)dlsym(lib_msp, "HI_MPI_SYS_Init");
    FN_SYS_Exit pSYS_Exit = (FN_SYS_Exit)dlsym(lib_msp, "HI_MPI_SYS_Exit");
    FN_VO_SetPubAttr pVO_SetPubAttr = (FN_VO_SetPubAttr)dlsym(lib_msp, "HI_MPI_VO_SetPubAttr");
    FN_VO_Enable pVO_Enable = (FN_VO_Enable)dlsym(lib_msp, "HI_MPI_VO_Enable");
    FN_VO_Disable pVO_Disable = (FN_VO_Disable)dlsym(lib_msp, "HI_MPI_VO_Disable");
    FN_VO_SetVideoLayerAttr pVO_SetVideoLayerAttr = (FN_VO_SetVideoLayerAttr)dlsym(lib_msp, "HI_MPI_VO_SetVideoLayerAttr");
    FN_VO_EnableVideoLayer pVO_EnableVideoLayer = (FN_VO_EnableVideoLayer)dlsym(lib_msp, "HI_MPI_VO_EnableVideoLayer");
    FN_VO_DisableVideoLayer pVO_DisableVideoLayer = (FN_VO_DisableVideoLayer)dlsym(lib_msp, "HI_MPI_VO_DisableVideoLayer");
    FN_HDMI_Open pHDMI_Open = (FN_HDMI_Open)dlsym(lib_msp, "HI_MPI_HDMI_Open");
    FN_HDMI_Close pHDMI_Close = (FN_HDMI_Close)dlsym(lib_msp, "HI_MPI_HDMI_Close");
    FN_HDMI_GetAttr pHDMI_GetAttr = (FN_HDMI_GetAttr)dlsym(lib_msp, "HI_MPI_HDMI_GetAttr");
    FN_HDMI_SetAttr pHDMI_SetAttr = (FN_HDMI_SetAttr)dlsym(lib_msp, "HI_MPI_HDMI_SetAttr");
    FN_HDMI_Start pHDMI_Start = (FN_HDMI_Start)dlsym(lib_msp, "HI_MPI_HDMI_Start");
    FN_HDMI_Stop pHDMI_Stop = (FN_HDMI_Stop)dlsym(lib_msp, "HI_MPI_HDMI_Stop");

    if (!pSYS_Init || !pVO_SetPubAttr || !pVO_Enable || !pHDMI_Open || !pHDMI_Start) {
        printf("ERROR: Cannot resolve MPP API symbols: %s\n", dlerror());
        dlclose(lib_msp);
        return 1;
    }

    HI_S32 s32Ret;
    VO_INTF_SYNC_E vo_sync = get_vo_sync(resolution);
    HDMI_VIDEO_FMT_E hdmi_fmt = get_hdmi_fmt(vo_sync);
    HI_U32 width, height;
    get_resolution(vo_sync, &width, &height);
    printf("VO sync=%d, HDMI fmt=%d, %ux%u\n", vo_sync, hdmi_fmt, width, height);

    s32Ret = pSYS_Init();
    if (s32Ret != HI_SUCCESS) { printf("HI_MPI_SYS_Init failed: 0x%x\n", s32Ret); dlclose(lib_msp); return 1; }
    printf("SYS_Init OK\n");

    VO_PUB_ATTR_S stPubAttr;
    memset(&stPubAttr, 0, sizeof(stPubAttr));
    stPubAttr.enIntfType = VO_INTF_HDMI;
    stPubAttr.enIntfSync = vo_sync;
    stPubAttr.u32BgColor = 0x00000000;

    s32Ret = pVO_SetPubAttr(VO_DEV_HD, &stPubAttr);
    if (s32Ret != HI_SUCCESS) { printf("VO_SetPubAttr failed: 0x%x\n", s32Ret); goto sys_exit; }
    printf("VO_SetPubAttr OK\n");

    s32Ret = pVO_Enable(VO_DEV_HD);
    if (s32Ret != HI_SUCCESS) { printf("VO_Enable failed: 0x%x\n", s32Ret); goto sys_exit; }
    printf("VO_Enable OK\n");

    VO_VIDEO_LAYER_ATTR_S stLayerAttr;
    memset(&stLayerAttr, 0, sizeof(stLayerAttr));
    stLayerAttr.stDispRect.s32X = 0;
    stLayerAttr.stDispRect.s32Y = 0;
    stLayerAttr.stDispRect.u32Width = width;
    stLayerAttr.stDispRect.u32Height = height;
    stLayerAttr.stImageSize.u32Width = width;
    stLayerAttr.stImageSize.u32Height = height;
    stLayerAttr.u32DispFrmRt = 60;
    stLayerAttr.enPixFormat = 0;

    s32Ret = pVO_SetVideoLayerAttr(VO_LAYER_VID, &stLayerAttr);
    if (s32Ret != HI_SUCCESS) { printf("VO_SetVideoLayerAttr failed: 0x%x\n", s32Ret); goto vo_disable; }
    printf("VO_SetVideoLayerAttr OK\n");

    s32Ret = pVO_EnableVideoLayer(VO_LAYER_VID);
    if (s32Ret != HI_SUCCESS) { printf("VO_EnableVideoLayer failed: 0x%x\n", s32Ret); goto vo_disable; }
    printf("VO_EnableVideoLayer OK\n");

    s32Ret = pHDMI_Open(HDMI_ID_0);
    if (s32Ret != HI_SUCCESS) { printf("HDMI_Open failed: 0x%x\n", s32Ret); goto layer_disable; }
    printf("HDMI_Open OK\n");

    if (pHDMI_GetAttr && pHDMI_SetAttr) {
        HDMI_ATTR_S stHdmiAttr;
        memset(&stHdmiAttr, 0, sizeof(stHdmiAttr));
        s32Ret = pHDMI_GetAttr(HDMI_ID_0, &stHdmiAttr);
        if (s32Ret == HI_SUCCESS) {
            stHdmiAttr.enVideoFmt = hdmi_fmt;
            stHdmiAttr.enVidOut = hdmi_fmt;
            stHdmiAttr.enSoundIntf = HDMI_SOUND_INTF_I2S;
            stHdmiAttr.bEnable = HI_TRUE;
            stHdmiAttr.bAuthMode = HI_FALSE;
            stHdmiAttr.enDeepColorMode = HDMI_DEEP_COLOR_24BIT;
            stHdmiAttr.stSoundAttr.enSampleRate = HDMI_SAMPLE_RATE_48K;
            stHdmiAttr.stSoundAttr.u8BitDepth = 16;
            s32Ret = pHDMI_SetAttr(HDMI_ID_0, &stHdmiAttr);
            if (s32Ret != HI_SUCCESS) printf("HDMI_SetAttr failed: 0x%x (continuing)\n", s32Ret);
            else printf("HDMI_SetAttr OK\n");
        } else {
            printf("HDMI_GetAttr failed: 0x%x (trying direct set)\n", s32Ret);
        }
    }

    s32Ret = pHDMI_Start(HDMI_ID_0);
    if (s32Ret != HI_SUCCESS) { printf("HDMI_Start failed: 0x%x\n", s32Ret); goto hdmi_close; }
    printf("HDMI_Start OK\n");

    printf("\n=== Display initialized: %s %ux%u via HDMI ===\n", resolution, width, height);

    if (daemon_mode) {
        printf("Running in daemon mode. Press Ctrl+C to stop.\n");
        while (g_run) { sleep(1); }
        printf("Shutting down...\n");
    } else {
        printf("Display init complete. Keeping display active for 5 seconds...\n");
        sleep(5);
        printf("Display will remain active after exit (modules stay loaded).\n");
    }

    pHDMI_Stop(HDMI_ID_0);
hdmi_close:
    pHDMI_Close(HDMI_ID_0);
layer_disable:
    pVO_DisableVideoLayer(VO_LAYER_VID);
vo_disable:
    pVO_Disable(VO_DEV_HD);
sys_exit:
    pSYS_Exit();
    dlclose(lib_msp);
    printf("Display deinitialized.\n");
    return 0;
}
INITEOF

          if [ -n "$MSP_INC" ] && [ -n "$MSP_LIB" ]; then
            echo "Compiling with SDK headers and libraries..."
            ${SDK_CROSS}gcc -o output/bin/hi_display_init /tmp/hi_display_init.c \
              -I"$MSP_INC" -L"$MSP_LIB" -lhi_msp -lpthread -lm -ldl \
              -Wl,-rpath,/opt/hisilicon/lib 2>&1 || {
              echo "Dynamic linking failed, trying static..."
              ${SDK_CROSS}gcc -o output/bin/hi_display_init /tmp/hi_display_init.c \
                -I"$MSP_INC" -L"$MSP_LIB" -lhi_msp -lpthread -lm -ldl -static 2>&1 || {
                echo "Static linking also failed, building standalone (dlopen-based)..."
                ${SDK_CROSS}gcc -o output/bin/hi_display_init /tmp/hi_display_init.c -ldl -lpthread 2>&1 || {
                  echo "All compilation attempts failed"
                }
              }
            }
          else
            echo "No SDK headers/libs found, building standalone dlopen-based program..."
            ${SDK_CROSS}gcc -o output/bin/hi_display_init /tmp/hi_display_init.c -ldl -lpthread 2>&1 || {
              echo "WARNING: Failed to compile display init program"
            }
          fi

          if [ -f output/bin/hi_display_init ]; then
            echo "Display init program built successfully"
            file output/bin/hi_display_init
          fi

      - name: Prepare and upload artifacts
        run: |
          mkdir -p output

          SDK_KERNEL="HiSTBLinuxV100R005C00SPC060/out/hi3798mv100/hi3798mdmo1g/image/emmc_image/hi_kernel.bin"
          OUT_UIMAGE="HiSTBLinuxV100R005C00SPC060/out/hi3798mv100/hi3798mdmo1g/obj/source/kernel/linux-4.4.y/arch/arm/boot/uImage"

          KERNEL_SRC=""
          for f in "$SDK_KERNEL" "$OUT_UIMAGE"; do
            if [ -f "$f" ]; then
              echo "Using: $f"
              KERNEL_SRC="$f"
              break
            fi
          done

          if [ -z "$KERNEL_SRC" ]; then
            echo "ERROR: No kernel found"
            exit 1
          fi

          cp "$KERNEL_SRC" output/hi_kernel_new.bin

          echo ""
          echo "=== Collecting kernel modules ==="
          OUT_DIR="HiSTBLinuxV100R005C00SPC060/out/hi3798mv100/hi3798mdmo1g"
          KO_DIR="output/kmodules"

          mkdir -p "$KO_DIR"

          echo "Searching for KO modules in SDK output..."
          find "$OUT_DIR" -name "*.ko" -type f 2>/dev/null | while read ko; do
            echo "  Found: $ko"
            cp "$ko" "$KO_DIR/"
          done

          echo ""
          echo "Searching for KO modules in SDK image directory..."
          IMAGE_DIR="HiSTBLinuxV100R005C00SPC060/out/hi3798mv100/hi3798mdmo1g/image"
          find "$IMAGE_DIR" -name "*.ko" -type f 2>/dev/null | while read ko; do
            echo "  Found: $ko"
            cp "$ko" "$KO_DIR/" 2>/dev/null || true
          done

          echo ""
          echo "KO modules collected: $(ls "$KO_DIR"/*.ko 2>/dev/null | wc -l)"

          echo ""
          echo "=== Collecting SDK sample programs and binaries ==="
          BIN_DIR="output/bin"
          mkdir -p "$BIN_DIR"

          echo "Searching for sample programs..."
          find "$OUT_DIR" -name "sample_*" -type f -executable 2>/dev/null | while read f; do
            echo "  Found: $f"
            cp "$f" "$BIN_DIR/" 2>/dev/null || true
          done

          echo "Searching for boot logo programs..."
          find "$OUT_DIR" \( -name "boot_logo" -o -name "hi_bootlogo" -o -name "hisi_logo*" \) -type f 2>/dev/null | while read f; do
            echo "  Found: $f"
            cp "$f" "$BIN_DIR/" 2>/dev/null || true
          done

          echo "Searching for init scripts..."
          find "$OUT_DIR" -name "*.sh" -path "*/init*" -type f 2>/dev/null | while read f; do
            echo "  Found: $f"
            cp "$f" "$BIN_DIR/" 2>/dev/null || true
          done
          find "$OUT_DIR" -name "hi_init.sh" -type f 2>/dev/null | while read f; do
            echo "  Found: $f"
            cp "$f" "$BIN_DIR/" 2>/dev/null || true
          done

          echo ""
          echo "=== Collecting SDK shared libraries ==="
          LIB_DIR="output/lib"
          mkdir -p "$LIB_DIR"

          find "$OUT_DIR" -name "libhi_*.so*" -type f 2>/dev/null | while read f; do
            echo "  Found: $f"
            cp "$f" "$LIB_DIR/" 2>/dev/null || true
          done

          find "$OUT_DIR" -name "libhi_*.so" -type l 2>/dev/null | while read f; do
            echo "  Found symlink: $f"
            cp -P "$f" "$LIB_DIR/" 2>/dev/null || true
          done

          echo ""
          echo "Binaries collected: $(ls "$BIN_DIR/" 2>/dev/null | wc -l)"
          ls -lh "$BIN_DIR/" 2>/dev/null || echo "No binaries found"

          echo ""
          echo "Libraries collected: $(ls "$LIB_DIR/" 2>/dev/null | wc -l)"
          ls -lh "$LIB_DIR/" 2>/dev/null || echo "No libraries found"

          echo ""
          echo "=== Final verification ==="
          echo "Size: $(du -h output/hi_kernel_new.bin | cut -f1)"
          strings output/hi_kernel_new.bin | grep "4.4.35" | head -5
          if strings output/hi_kernel_new.bin | grep -q "4.4.35_ecoo"; then
            echo "OK: Version matches 4.4.35_ecoo_81082668"
          else
            echo "FAIL: Version does NOT match!"
          fi

      - name: Upload kernel artifact
        uses: actions/upload-artifact@v4
        with:
          name: hi3798mv100-kernel
          path: output/
          retention-days: 30
