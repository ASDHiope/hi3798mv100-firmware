name: Build Kernel

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential gcc-arm-linux-gnueabihf \
            binutils-arm-linux-gnueabihf cpp-arm-linux-gnueabihf \
            make gettext bison flex bc zlib1g-dev libncurses5-dev \
            lzma u-boot-tools device-tree-compiler git cpio \
            python3 python3-pyelftools libssl-dev wget

      - name: Clone HiSTBLinux SDK
        run: |
          git clone --depth 1 \
            https://gitee.com/lh736/HiSTBLinuxV100R005C00SPC060.git \
            HiSTBLinuxV100R005C00SPC060 || {
              echo "Gitee clone failed, trying GitHub mirror..."
              git clone --depth 1 \
                https://github.com/wdznb/EC6108V9C_HiSTBLinuxV100R005C00SPC060.git \
                HiSTBLinuxV100R005C00SPC060
            }

      - name: Patch defconfig and SDK config BEFORE build
        run: |
          cd HiSTBLinuxV100R005C00SPC060

          echo "=== Step 1: Find and patch ALL hi3798mv100 defconfig files ==="
          DEFCONFIGS=$(find . -name "*hi3798mv100*defconfig*" -path "*/arm/*" -type f 2>/dev/null)
          echo "Found defconfig files:"
          echo "$DEFCONFIGS"

          echo ""
          echo "=== Patching ALL defconfig files ==="
          for DEFCONFIG in $DEFCONFIGS; do
            echo "Patching: $DEFCONFIG"
            echo "  Before:"
            grep "LOCALVERSION" "$DEFCONFIG" 2>/dev/null || echo "  (no LOCALVERSION)"
            grep "DEVTMPFS" "$DEFCONFIG" 2>/dev/null || echo "  (no DEVTMPFS)"

            sed -i 's/CONFIG_LOCALVERSION="_s40"/CONFIG_LOCALVERSION="_ecoo_81082668"/' "$DEFCONFIG"
            sed -i 's/CONFIG_LOCALVERSION_AUTO=y/# CONFIG_LOCALVERSION_AUTO is not set/' "$DEFCONFIG"
            if ! grep -q 'CONFIG_LOCALVERSION=' "$DEFCONFIG"; then
              echo 'CONFIG_LOCALVERSION="_ecoo_81082668"' >> "$DEFCONFIG"
            fi
            sed -i 's/# CONFIG_DEVTMPFS is not set/CONFIG_DEVTMPFS=y/' "$DEFCONFIG"
            if ! grep -q "CONFIG_DEVTMPFS=y" "$DEFCONFIG"; then
              echo "CONFIG_DEVTMPFS=y" >> "$DEFCONFIG"
            fi
            if ! grep -q "CONFIG_DEVTMPFS_MOUNT=y" "$DEFCONFIG"; then
              echo "CONFIG_DEVTMPFS_MOUNT=y" >> "$DEFCONFIG"
            fi

            echo "  After:"
            grep "LOCALVERSION" "$DEFCONFIG" 2>/dev/null
            grep "DEVTMPFS" "$DEFCONFIG" 2>/dev/null
          done

          echo ""
          echo "=== Step 3: Patch cfg.mak and SDK config files ==="
          CFG_MAK="configs/hi3798mv100/hi3798mdmo1g_hi3798mv100_cfg.mak"
          if [ -f "$CFG_MAK" ]; then
            echo "Content of $CFG_MAK:"
            cat "$CFG_MAK"
            echo ""
            grep -i "localversion\|_s40" "$CFG_MAK" && \
              sed -i 's/_s40/_ecoo_81082668/g' "$CFG_MAK" || \
              echo "No _s40 or LOCALVERSION in cfg.mak"
          fi

          echo ""
          echo "=== Step 4: Search for any file that sets CONFIG_LOCALVERSION ==="
          grep -rn 'CONFIG_LOCALVERSION' \
            --include="*.mak" --include="*.cfg" --include="*.sh" --include="defconfig" \
            2>/dev/null | head -20

          echo ""
          echo "=== Step 5: Fix SDK missing scripts and copy DTS ==="
          KERNEL_VERSION="4.4.35"
          SDK_KERNEL="source/kernel/linux-4.4.y"

          if [ ! -d "${SDK_KERNEL}/scripts/basic" ] || [ ! -d "${SDK_KERNEL}/scripts/kconfig" ]; then
            echo "Downloading Linux ${KERNEL_VERSION} for missing scripts..."
            wget -q "https://mirrors.edge.kernel.org/pub/linux/kernel/v4.x/linux-${KERNEL_VERSION}.tar.gz"
            tar xzf "linux-${KERNEL_VERSION}.tar.gz"
            [ ! -d "${SDK_KERNEL}/scripts/basic" ] && cp -r "linux-${KERNEL_VERSION}/scripts/basic/" "${SDK_KERNEL}/scripts/"
            [ ! -d "${SDK_KERNEL}/scripts/kconfig" ] && cp -r "linux-${KERNEL_VERSION}/scripts/kconfig/" "${SDK_KERNEL}/scripts/"
          fi

          if [ -f "../dts/hi3798mv100.dts" ]; then
            cp ../dts/hi3798mv100.dts "${SDK_KERNEL}/arch/arm/boot/dts/"
            if ! grep -q "hi3798mv100.dts" "${SDK_KERNEL}/arch/arm/boot/dts/Makefile" 2>/dev/null; then
              echo "dtb-\$(CONFIG_ARCH_HI3798MV100) += hi3798mv100.dtb" >> "${SDK_KERNEL}/arch/arm/boot/dts/Makefile"
            fi
          fi

      - name: Build kernel with SDK
        run: |
          cd HiSTBLinuxV100R005C00SPC060
          cp configs/hi3798mv100/hi3798mdmo1g_hi3798mv100_cfg.mak cfg.mak
          source env.sh
          make linux -j$(nproc) 2>&1 | tee /tmp/sdk_build.log | tail -10

          echo ""
          echo "=== Extract CROSS_COMPILE from build log ==="
          SDK_CROSS=$(grep -oP 'CROSS_COMPILE=\K\S+' /tmp/sdk_build.log | head -1)
          if [ -z "$SDK_CROSS" ]; then
            SDK_CROSS=$(grep -oP 'CROSS_COMPILE=arm-\S+' /tmp/sdk_build.log | head -1 | sed 's/CROSS_COMPILE=//')
          fi
          echo "SDK cross-compiler prefix: ${SDK_CROSS}"
          echo "SDK_CROSS=${SDK_CROSS}" >> $GITHUB_ENV

          echo ""
          echo "=== Find SDK toolchain path ==="
          TOOLCHAIN_DIR=$(find tools/ -name "arm-his*-linux" -type d 2>/dev/null | head -1)
          if [ -n "$TOOLCHAIN_DIR" ]; then
            TOOLCHAIN_BIN="${TOOLCHAIN_DIR}/bin"
            echo "Toolchain bin: ${TOOLCHAIN_BIN}"
            ls "${TOOLCHAIN_BIN}/" | head -5
            echo "${TOOLCHAIN_BIN}" >> $GITHUB_PATH
            echo "TOOLCHAIN_BIN=${TOOLCHAIN_BIN}" >> $GITHUB_ENV
          else
            echo "Toolchain not found in tools/, searching elsewhere..."
            find . -name "arm-his*-gcc" -type f 2>/dev/null | head -5
          fi

      - name: Verify and fix kernel version
        run: |
          cd HiSTBLinuxV100R005C00SPC060

          echo "=== Check SDK build output ==="
          SDK_KERNEL_BIN="out/hi3798mv100/hi3798mdmo1g/image/emmc_image/hi_kernel.bin"

          if [ -f "$SDK_KERNEL_BIN" ]; then
            echo "Version strings in kernel:"
            strings "$SDK_KERNEL_BIN" | grep "4.4.35" | head -5

            if strings "$SDK_KERNEL_BIN" | grep -q "4.4.35_ecoo"; then
              echo "OK: Version is 4.4.35_ecoo_81082668 - no rebuild needed!"
              echo "NEED_REBUILD=0" >> $GITHUB_ENV
              exit 0
            fi
          fi

          echo ""
          echo "=== Version is wrong, patching .config and rebuilding with SDK ==="
          echo "NEED_REBUILD=1" >> $GITHUB_ENV

          OUT_DIR="out/hi3798mv100/hi3798mdmo1g/obj/source/kernel/linux-4.4.y"

          echo ""
          echo "=== Patching ALL .config files ==="
          for cfgfile in $(find . -name ".config" -path "*/linux-4.4.y/*" -type f 2>/dev/null); do
            echo "  Patching: $cfgfile"
            sed -i 's/CONFIG_LOCALVERSION=".*"/CONFIG_LOCALVERSION="_ecoo_81082668"/' "$cfgfile"
            if ! grep -q 'CONFIG_LOCALVERSION=' "$cfgfile"; then
              echo 'CONFIG_LOCALVERSION="_ecoo_81082668"' >> "$cfgfile"
            fi
            sed -i 's/CONFIG_LOCALVERSION_AUTO=y/# CONFIG_LOCALVERSION_AUTO is not set/' "$cfgfile"
            for opt in DEVTMPFS DEVTMPFS_MOUNT TMPFS FUTEX EPOLL SIGNALFD TIMERFD EVENTFD INOTIFY_USER FHANDLE MULTIUSER SYSFS; do
              sed -i "s/# CONFIG_${opt} is not set/CONFIG_${opt}=y/" "$cfgfile"
              if ! grep -q "CONFIG_${opt}=y" "$cfgfile"; then
                echo "CONFIG_${opt}=y" >> "$cfgfile"
              fi
            done
          done

          echo ""
          echo "=== Delete ALL cached version files in out/ and source/ ==="
          find . -name "kernel.release" -path "*/linux-4.4.y/*" -delete 2>/dev/null
          find . -name "utsrelease.h" -path "*/linux-4.4.y/*" -delete 2>/dev/null
          find . -name "compile.h" -path "*/generated/*" -delete 2>/dev/null

          echo ""
          echo "=== Delete version object files in out/ directory ==="
          if [ -d "$OUT_DIR" ]; then
            rm -f "$OUT_DIR/init/version.o" "$OUT_DIR/init/version.s"
            rm -f "$OUT_DIR/init/do_mounts.o"
            rm -f "$OUT_DIR/drivers/base/devtmpfs.o" "$OUT_DIR/drivers/base/devtmpfs.s"
            rm -f "$OUT_DIR/include/config/kernel.release"
            rm -f "$OUT_DIR/include/generated/utsrelease.h"
            rm -f "$OUT_DIR/include/generated/compile.h"
            echo "Deleted cached files in $OUT_DIR"
          fi

          echo ""
          echo "=== Verify .config in out/ directory ==="
          if [ -f "$OUT_DIR/.config" ]; then
            echo "out/ .config LOCALVERSION:"
            grep "CONFIG_LOCALVERSION=" "$OUT_DIR/.config"
            echo "out/ .config DEVTMPFS:"
            grep "CONFIG_DEVTMPFS" "$OUT_DIR/.config"
          fi

          echo ""
          echo "=== Rebuilding kernel with SDK make linux ==="
          source env.sh
          make linux -j$(nproc) 2>&1 | tail -20

          echo ""
          echo "=== Verify rebuilt kernel ==="
          if [ -f "$SDK_KERNEL_BIN" ]; then
            echo "Version strings:"
            strings "$SDK_KERNEL_BIN" | grep "4.4.35" | head -5
            if strings "$SDK_KERNEL_BIN" | grep -q "4.4.35_ecoo"; then
              echo "OK: Version is 4.4.35_ecoo_81082668"
            else
              echo "FAIL: Version is still NOT 4.4.35_ecoo_81082668"
            fi
            if strings "$SDK_KERNEL_BIN" | grep -qi "devtmpfs"; then
              echo "OK: devtmpfs found"
            else
              echo "FAIL: devtmpfs NOT found"
            fi
          else
            echo "ERROR: Kernel binary not found!"
            find . -name "hi_kernel*" -o -name "uImage" 2>/dev/null | head -10
          fi

      - name: Prepare artifacts
        run: |
          mkdir -p output

          UIMAGE="HiSTBLinuxV100R005C00SPC060/source/kernel/linux-4.4.y/arch/arm/boot/uImage"
          OUT_UIMAGE="HiSTBLinuxV100R005C00SPC060/out/hi3798mv100/hi3798mdmo1g/obj/source/kernel/linux-4.4.y/arch/arm/boot/uImage"
          SDK_KERNEL="HiSTBLinuxV100R005C00SPC060/out/hi3798mv100/hi3798mdmo1g/image/emmc_image/hi_kernel.bin"

          KERNEL_SRC=""
          for f in "$UIMAGE" "$OUT_UIMAGE" "$SDK_KERNEL"; do
            if [ -f "$f" ]; then
              echo "Using: $f"
              KERNEL_SRC="$f"
              break
            fi
          done

          if [ -z "$KERNEL_SRC" ]; then
            echo "ERROR: No kernel found"
            find HiSTBLinuxV100R005C00SPC060/ -name "uImage" -o -name "hi_kernel*" 2>/dev/null || true
            exit 1
          fi

          cp "$KERNEL_SRC" output/hi_kernel_new.bin

          echo ""
          echo "=== Final verification ==="
          echo "Size: $(du -h output/hi_kernel_new.bin | cut -f1)"
          strings output/hi_kernel_new.bin | grep "4.4.35" | head -5
          if strings output/hi_kernel_new.bin | grep -q "4.4.35_ecoo"; then
            echo "OK: Version matches 4.4.35_ecoo_81082668"
          else
            echo "FAIL: Version does NOT match!"
          fi
          if strings output/hi_kernel_new.bin | grep -qi "devtmpfs"; then
            echo "OK: devtmpfs found"
          else
            echo "FAIL: devtmpfs NOT found!"
          fi

      - name: Upload kernel artifact
        uses: actions/upload-artifact@v4
        with:
          name: hi3798mv100-kernel
          path: output/
          retention-days: 30
