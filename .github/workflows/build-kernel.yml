name: Build Kernel

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential gcc-arm-linux-gnueabihf \
            binutils-arm-linux-gnueabihf cpp-arm-linux-gnueabihf \
            make gettext bison flex bc zlib1g-dev libncurses5-dev \
            lzma u-boot-tools device-tree-compiler git cpio \
            python3 python3-pyelftools libssl-dev wget

      - name: Clone HiSTBLinux SDK
        run: |
          git clone --depth 1 \
            https://gitee.com/lh736/HiSTBLinuxV100R005C00SPC060.git \
            HiSTBLinuxV100R005C00SPC060 || {
              echo "Gitee clone failed, trying GitHub mirror..."
              git clone --depth 1 \
                https://github.com/wdznb/EC6108V9C_HiSTBLinuxV100R005C00SPC060.git \
                HiSTBLinuxV100R005C00SPC060
            }

      - name: Fix SDK missing files and copy DTS
        run: |
          KERNEL_VERSION="4.4.35"
          SDK_KERNEL="HiSTBLinuxV100R005C00SPC060/source/kernel/linux-4.4.y"

          if [ ! -d "${SDK_KERNEL}/scripts/basic" ] || [ ! -d "${SDK_KERNEL}/scripts/kconfig" ]; then
            echo "Downloading Linux ${KERNEL_VERSION} for missing scripts..."
            wget -q "https://mirrors.edge.kernel.org/pub/linux/kernel/v4.x/linux-${KERNEL_VERSION}.tar.gz"
            tar xzf "linux-${KERNEL_VERSION}.tar.gz"
            [ ! -d "${SDK_KERNEL}/scripts/basic" ] && cp -r "linux-${KERNEL_VERSION}/scripts/basic/" "${SDK_KERNEL}/scripts/"
            [ ! -d "${SDK_KERNEL}/scripts/kconfig" ] && cp -r "linux-${KERNEL_VERSION}/scripts/kconfig/" "${SDK_KERNEL}/scripts/"
          fi

          if [ -f "dts/hi3798mv100.dts" ]; then
            cp dts/hi3798mv100.dts "${SDK_KERNEL}/arch/arm/boot/dts/"
            if ! grep -q "hi3798mv100.dts" "${SDK_KERNEL}/arch/arm/boot/dts/Makefile" 2>/dev/null; then
              echo "dtb-\$(CONFIG_ARCH_HI3798MV100) += hi3798mv100.dtb" >> "${SDK_KERNEL}/arch/arm/boot/dts/Makefile"
            fi
          fi

      - name: Build kernel with SDK
        run: |
          cd HiSTBLinuxV100R005C00SPC060
          cp configs/hi3798mv100/hi3798mdmo1g_hi3798mv100_cfg.mak cfg.mak
          source env.sh
          make linux -j$(nproc)

      - name: Find and patch kernel .config
        run: |
          echo "=== Searching for .config ==="
          find HiSTBLinuxV100R005C00SPC060/ -name ".config" -type f 2>/dev/null

          CONFIG_FILE=""
          for f in \
            HiSTBLinuxV100R005C00SPC060/source/kernel/linux-4.4.y/.config \
            HiSTBLinuxV100R005C00SPC060/out/hi3798mv100/hi3798mdmo1g/obj/source/kernel/linux-4.4.y/.config; do
            if [ -f "$f" ]; then
              CONFIG_FILE="$f"
              break
            fi
          done

          if [ -z "$CONFIG_FILE" ]; then
            CONFIG_FILE=$(find HiSTBLinuxV100R005C00SPC060/ -name ".config" -type f 2>/dev/null | head -1)
          fi

          if [ -z "$CONFIG_FILE" ]; then
            echo "FATAL: .config not found anywhere!"
            exit 1
          fi

          echo "Found .config: $CONFIG_FILE"
          echo ""

          echo "=== Before patching ==="
          grep "CONFIG_LOCALVERSION=" "$CONFIG_FILE" || echo "(no LOCALVERSION)"
          grep "CONFIG_DEVTMPFS" "$CONFIG_FILE" || echo "(no DEVTMPFS)"
          grep "CONFIG_DEVTMPFS_MOUNT" "$CONFIG_FILE" || echo "(no DEVTMPFS_MOUNT)"

          echo ""
          echo "=== Patching ==="
          sed -i 's/CONFIG_LOCALVERSION=".*"/CONFIG_LOCALVERSION="_ecoo_81082668"/' "$CONFIG_FILE"
          if ! grep -q 'CONFIG_LOCALVERSION=' "$CONFIG_FILE"; then
            sed -i '1i CONFIG_LOCALVERSION="_ecoo_81082668"' "$CONFIG_FILE"
          fi
          sed -i 's/CONFIG_LOCALVERSION_AUTO=y/# CONFIG_LOCALVERSION_AUTO is not set/' "$CONFIG_FILE"

          for opt in DEVTMPFS DEVTMPFS_MOUNT TMPFS FUTEX EPOLL SIGNALFD TIMERFD EVENTFD INOTIFY_USER FHANDLE MULTIUSER SYSFS; do
            sed -i "s/# CONFIG_${opt} is not set/CONFIG_${opt}=y/" "$CONFIG_FILE"
            if ! grep -q "CONFIG_${opt}=y" "$CONFIG_FILE"; then
              echo "CONFIG_${opt}=y" >> "$CONFIG_FILE"
            fi
          done

          echo ""
          echo "=== After patching ==="
          grep "CONFIG_LOCALVERSION=" "$CONFIG_FILE"
          grep "CONFIG_DEVTMPFS" "$CONFIG_FILE"
          grep "CONFIG_DEVTMPFS_MOUNT" "$CONFIG_FILE"

          KERNEL_DIR=$(dirname "$CONFIG_FILE")
          if [ "$KERNEL_DIR" != "HiSTBLinuxV100R005C00SPC060/source/kernel/linux-4.4.y" ]; then
            echo "Copying patched .config to kernel source tree..."
            cp "$CONFIG_FILE" HiSTBLinuxV100R005C00SPC060/source/kernel/linux-4.4.y/.config
            KERNEL_DIR="HiSTBLinuxV100R005C00SPC060/source/kernel/linux-4.4.y"
          fi

          echo ""
          echo "=== Running oldconfig ==="
          cd "$KERNEL_DIR"
          make ARCH=arm CROSS_COMPILE=arm-linux-gnueabihf- oldconfig </dev/null 2>&1 || true

          echo ""
          echo "=== After oldconfig ==="
          grep "CONFIG_LOCALVERSION=" .config
          grep "CONFIG_DEVTMPFS" .config
          grep "CONFIG_DEVTMPFS_MOUNT" .config

      - name: Rebuild kernel with patched config
        run: |
          cd HiSTBLinuxV100R005C00SPC060/source/kernel/linux-4.4.y

          echo "=== Rebuilding kernel ==="
          make ARCH=arm CROSS_COMPILE=arm-linux-gnueabihf- clean 2>&1 | tail -3
          make ARCH=arm CROSS_COMPILE=arm-linux-gnueabihf- -j$(nproc) 2>&1 | tail -10

          echo ""
          echo "=== Creating uImage ==="
          make ARCH=arm CROSS_COMPILE=arm-linux-gnueabihf- uImage 2>&1 || true

          echo ""
          echo "=== Build output ==="
          ls -lh arch/arm/boot/uImage 2>/dev/null || echo "uImage not found"
          ls -lh arch/arm/boot/zImage 2>/dev/null || echo "zImage not found"

          if [ -f arch/arm/boot/uImage ]; then
            echo ""
            echo "=== Verifying uImage ==="
            strings arch/arm/boot/uImage | grep "4.4.35" | head -5
            if strings arch/arm/boot/uImage | grep -q "4.4.35_ecoo"; then
              echo "OK: Version is 4.4.35_ecoo_81082668"
            else
              echo "FAIL: Version is NOT 4.4.35_ecoo_81082668"
            fi
            if strings arch/arm/boot/uImage | grep -qi "devtmpfs"; then
              echo "OK: devtmpfs found"
            else
              echo "FAIL: devtmpfs NOT found"
            fi
          fi

      - name: Prepare artifacts
        run: |
          mkdir -p output

          UIMAGE="HiSTBLinuxV100R005C00SPC060/source/kernel/linux-4.4.y/arch/arm/boot/uImage"
          SDK_KERNEL="HiSTBLinuxV100R005C00SPC060/out/hi3798mv100/hi3798mdmo1g/image/emmc_image/hi_kernel.bin"

          if [ -f "$UIMAGE" ]; then
            cp "$UIMAGE" output/hi_kernel_new.bin
            echo "Using direct-build uImage"
          elif [ -f "$SDK_KERNEL" ]; then
            cp "$SDK_KERNEL" output/hi_kernel_new.bin
            echo "WARNING: Using SDK kernel (patches may not be applied)"
          else
            echo "ERROR: No kernel found"
            find HiSTBLinuxV100R005C00SPC060/ -name "uImage" -o -name "hi_kernel*" 2>/dev/null || true
            exit 1
          fi

          echo ""
          echo "=== Final verification ==="
          echo "Size: $(du -h output/hi_kernel_new.bin | cut -f1)"
          strings output/hi_kernel_new.bin | grep "4.4.35" | head -5
          if strings output/hi_kernel_new.bin | grep -q "4.4.35_ecoo"; then
            echo "OK: Version matches 4.4.35_ecoo_81082668"
          else
            echo "FAIL: Version does NOT match!"
          fi
          if strings output/hi_kernel_new.bin | grep -qi "devtmpfs"; then
            echo "OK: devtmpfs found"
          else
            echo "FAIL: devtmpfs NOT found!"
          fi

      - name: Upload kernel artifact
        uses: actions/upload-artifact@v4
        with:
          name: hi3798mv100-kernel
          path: output/
          retention-days: 30
