name: Build Kernel

on:
  push:
    branches: [main, master]
    paths:
      - 'dts/**'
      - 'configs/**'
      - 'scripts/build_kernel.sh'
      - '.github/workflows/build-kernel.yml'
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      sdk_repo:
        description: 'HiSTBLinux SDK repository URL'
        required: false
        default: 'https://gitee.com/lh736/HiSTBLinuxV100R005C00SPC060.git'
      sdk_branch:
        description: 'SDK branch/tag'
        required: false
        default: 'master'

jobs:
  build-kernel:
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential gcc-arm-linux-gnueabihf \
            binutils-arm-linux-gnueabihf cpp-arm-linux-gnueabihf \
            make gettext bison flex bc zlib1g-dev libncurses5-dev \
            lzma u-boot-tools device-tree-compiler git cpio \
            python3 python3-pyelftools libssl-dev wget

      - name: Clone HiSTBLinux SDK
        run: |
          git clone --depth 1 \
            ${{ github.event.inputs.sdk_repo || 'https://gitee.com/lh736/HiSTBLinuxV100R005C00SPC060.git' }} \
            HiSTBLinuxV100R005C00SPC060 || {
              echo "Gitee clone failed, trying GitHub mirror..."
              git clone --depth 1 \
                https://github.com/wdznb/EC6108V9C_HiSTBLinuxV100R005C00SPC060.git \
                HiSTBLinuxV100R005C00SPC060
            }

      - name: Fix SDK missing files
        run: |
          KERNEL_VERSION="4.4.35"
          SDK_KERNEL="HiSTBLinuxV100R005C00SPC060/source/kernel/linux-4.4.y"

          if [ ! -d "${SDK_KERNEL}/scripts/basic" ] || [ ! -d "${SDK_KERNEL}/scripts/kconfig" ]; then
            echo "Downloading Linux ${KERNEL_VERSION} for missing scripts..."
            wget -q "https://mirrors.edge.kernel.org/pub/linux/kernel/v4.x/linux-${KERNEL_VERSION}.tar.gz"
            tar xzf "linux-${KERNEL_VERSION}.tar.gz"

            [ ! -d "${SDK_KERNEL}/scripts/basic" ] && cp -r "linux-${KERNEL_VERSION}/scripts/basic/" "${SDK_KERNEL}/scripts/"
            [ ! -d "${SDK_KERNEL}/scripts/kconfig" ] && cp -r "linux-${KERNEL_VERSION}/scripts/kconfig/" "${SDK_KERNEL}/scripts/"
          fi

      - name: Copy custom DTS
        run: |
          SDK_KERNEL="HiSTBLinuxV100R005C00SPC060/source/kernel/linux-4.4.y"
          DTS_DIR="${SDK_KERNEL}/arch/arm/boot/dts"

          if [ -f "dts/hi3798mv100.dts" ]; then
            cp dts/hi3798mv100.dts "${DTS_DIR}/"
            echo "Custom DTS copied"

            if grep -q "hi3798mv100.dts" "${DTS_DIR}/Makefile" 2>/dev/null; then
              echo "DTS already in Makefile"
            else
              echo "dtb-\$(CONFIG_ARCH_HI3798MV100) += hi3798mv100.dtb" >> "${DTS_DIR}/Makefile"
              echo "DTS added to Makefile"
            fi
          fi

      - name: Build kernel with SDK (first pass)
        run: |
          cd HiSTBLinuxV100R005C00SPC060
          if [ -f "configs/hi3798mv100/hi3798mdmo1g_hi3798mv100_cfg.mak" ]; then
            cp configs/hi3798mv100/hi3798mdmo1g_hi3798mv100_cfg.mak cfg.mak
          else
            echo "ERROR: cfg.mak not found"
            find configs/ -name "*hi3798*" -type f 2>/dev/null || true
            exit 1
          fi

          source env.sh
          make linux -j$(nproc)

          echo "=== SDK build complete ==="
          echo "Searching for .config..."
          find out/ -name ".config" 2>/dev/null || true
          find source/kernel/ -name ".config" 2>/dev/null || true

      - name: Patch kernel config and rebuild
        run: |
          cd HiSTBLinuxV100R005C00SPC060

          CONFIG_FILE=$(find source/kernel/linux-4.4.y -name ".config" | head -1)
          if [ -z "$CONFIG_FILE" ]; then
            CONFIG_FILE=$(find out/ -name ".config" | head -1)
          fi

          if [ -z "$CONFIG_FILE" ]; then
            echo "ERROR: .config not found anywhere!"
            exit 1
          fi

          echo "Found .config at: $CONFIG_FILE"
          echo ""
          echo "=== Before patching ==="
          grep "CONFIG_LOCALVERSION=" "$CONFIG_FILE" || echo "LOCALVERSION not set"
          grep "CONFIG_DEVTMPFS" "$CONFIG_FILE" || echo "DEVTMPFS not set"
          grep "CONFIG_DEVTMPFS_MOUNT" "$CONFIG_FILE" || echo "DEVTMPFS_MOUNT not set"

          echo ""
          echo "=== Patching .config ==="

          sed -i 's/CONFIG_LOCALVERSION=".*"/CONFIG_LOCALVERSION="_ecoo_81082668"/' "$CONFIG_FILE"
          sed -i 's/CONFIG_LOCALVERSION_AUTO=y/# CONFIG_LOCALVERSION_AUTO is not set/' "$CONFIG_FILE" 2>/dev/null || true
          if ! grep -q "CONFIG_LOCALVERSION=" "$CONFIG_FILE"; then
            echo 'CONFIG_LOCALVERSION="_ecoo_81082668"' >> "$CONFIG_FILE"
          fi
          if grep -q "CONFIG_LOCALVERSION_AUTO=y" "$CONFIG_FILE"; then
            sed -i 's/CONFIG_LOCALVERSION_AUTO=y/# CONFIG_LOCALVERSION_AUTO is not set/' "$CONFIG_FILE"
          fi

          for opt in DEVTMPFS DEVTMPFS_MOUNT TMPFS FUTEX EPOLL SIGNALFD TIMERFD EVENTFD INOTIFY_USER FHANDLE MULTIUSER SYSFS; do
            sed -i "s/# CONFIG_${opt} is not set/CONFIG_${opt}=y/" "$CONFIG_FILE" 2>/dev/null || true
            if ! grep -q "CONFIG_${opt}=y" "$CONFIG_FILE"; then
              echo "CONFIG_${opt}=y" >> "$CONFIG_FILE"
            fi
          done

          echo ""
          echo "=== After patching ==="
          grep "CONFIG_LOCALVERSION=" "$CONFIG_FILE"
          grep "CONFIG_DEVTMPFS" "$CONFIG_FILE"
          grep "CONFIG_DEVTMPFS_MOUNT" "$CONFIG_FILE"

          echo ""
          echo "=== Running oldconfig ==="
          cd source/kernel/linux-4.4.y
          make ARCH=arm CROSS_COMPILE=arm-linux-gnueabihf- oldconfig </dev/null 2>&1 || true

          echo ""
          echo "=== After oldconfig ==="
          grep "CONFIG_LOCALVERSION=" .config
          grep "CONFIG_DEVTMPFS" .config
          grep "CONFIG_DEVTMPFS_MOUNT" .config

          echo ""
          echo "=== Rebuilding kernel directly ==="
          make ARCH=arm CROSS_COMPILE=arm-linux-gnueabihf- -j$(nproc) 2>&1 | tail -20

          echo ""
          echo "=== Creating uImage ==="
          make ARCH=arm CROSS_COMPILE=arm-linux-gnueabihf- uImage 2>&1 || true

          echo ""
          echo "=== Kernel build output ==="
          ls -lh arch/arm/boot/uImage 2>/dev/null || echo "uImage not found at arch/arm/boot/uImage"
          ls -lh arch/arm/boot/zImage 2>/dev/null || echo "zImage not found"

      - name: Prepare artifacts
        run: |
          mkdir -p output

          SDK_OUT="HiSTBLinuxV100R005C00SPC060/out/hi3798mv100/hi3798mdmo1g/image/emmc_image"
          KERNEL_BOOT="HiSTBLinuxV100R005C00SPC060/source/kernel/linux-4.4.y/arch/arm/boot"

          if [ -f "${SDK_OUT}/hi_kernel.bin" ]; then
            cp "${SDK_OUT}/hi_kernel.bin" output/hi_kernel_sdk.bin
            echo "SDK kernel found"
          fi

          if [ -f "${KERNEL_BOOT}/uImage" ]; then
            cp "${KERNEL_BOOT}/uImage" output/hi_kernel_new.bin
            echo "Direct-build uImage found"
          elif [ -f "${SDK_OUT}/hi_kernel.bin" ]; then
            cp "${SDK_OUT}/hi_kernel.bin" output/hi_kernel_new.bin
            echo "Using SDK kernel as fallback"
          else
            echo "Searching for kernel..."
            find HiSTBLinuxV100R005C00SPC060/ -name "uImage" -type f 2>/dev/null || true
            find HiSTBLinuxV100R005C00SPC060/ -name "zImage" -type f 2>/dev/null || true
            echo "ERROR: No kernel image found"
            exit 1
          fi

          echo ""
          echo "=== Verifying kernel ==="
          echo "Kernel size: $(du -h output/hi_kernel_new.bin | cut -f1)"
          echo ""
          echo "Version strings:"
          strings output/hi_kernel_new.bin | grep "4.4.35" | head -5 || true
          echo ""
          if strings output/hi_kernel_new.bin | grep -q "4.4.35_ecoo"; then
            echo "OK: Version matches 4.4.35_ecoo_81082668"
          else
            echo "WARNING: Version does NOT match! Expected 4.4.35_ecoo_81082668"
          fi
          echo ""
          if strings output/hi_kernel_new.bin | grep -q "devtmpfs"; then
            echo "OK: devtmpfs found in kernel binary"
          else
            echo "WARNING: devtmpfs NOT found in kernel binary!"
          fi

      - name: Upload kernel artifact
        uses: actions/upload-artifact@v4
        with:
          name: hi3798mv100-kernel
          path: output/
          retention-days: 30

      - name: Build summary
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Device | Hi3798MV100 mdmo1g |" >> $GITHUB_STEP_SUMMARY
          echo "| Kernel | Linux 4.4.35_ecoo_81082668 |" >> $GITHUB_STEP_SUMMARY
          echo "| SDK | HiSTBLinuxV100R005C00SPC060 |" >> $GITHUB_STEP_SUMMARY
          echo "| DEVTMPFS | Enabled |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Verification" >> $GITHUB_STEP_SUMMARY
          strings output/hi_kernel_new.bin | grep "4.4.35" | head -3 >> $GITHUB_STEP_SUMMARY 2>/dev/null || true
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Output Files" >> $GITHUB_STEP_SUMMARY
          ls -lh output/ >> $GITHUB_STEP_SUMMARY 2>/dev/null || true
