name: Build Kernel

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: build-kernel-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-kernel:
    runs-on: ubuntu-22.04
    timeout-minutes: 90
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential gcc-arm-linux-gnueabihf \
            binutils-arm-linux-gnueabihf cpp-arm-linux-gnueabihf \
            make gettext bison flex bc zlib1g-dev libncurses5-dev \
            lzma u-boot-tools device-tree-compiler git cpio \
            python3 python3-pyelftools libssl-dev wget

      - name: Clone HiSTBLinux SDK
        run: |
          git clone --depth 1 \
            https://gitee.com/lh736/HiSTBLinuxV100R005C00SPC060.git \
            HiSTBLinuxV100R005C00SPC060 || {
              echo "Gitee clone failed, trying GitHub mirror..."
              git clone --depth 1 \
                https://github.com/wdznb/EC6108V9C_HiSTBLinuxV100R005C00SPC060.git \
                HiSTBLinuxV100R005C00SPC060
            }

      - name: Patch defconfig and build kernel
        run: |
          cd HiSTBLinuxV100R005C00SPC060

          echo "=== Patch ALL hi3798mv100 defconfig files ==="
          for DEFCONFIG in $(find . -name "*hi3798mv100*defconfig*" -path "*/arm/*" -type f 2>/dev/null); do
            echo "Patching: $DEFCONFIG"
            sed -i 's/CONFIG_LOCALVERSION="_s40"/CONFIG_LOCALVERSION="_ecoo_81082668"/' "$DEFCONFIG"
            sed -i 's/CONFIG_LOCALVERSION_AUTO=y/# CONFIG_LOCALVERSION_AUTO is not set/' "$DEFCONFIG"
            if ! grep -q 'CONFIG_LOCALVERSION=' "$DEFCONFIG"; then
              echo 'CONFIG_LOCALVERSION="_ecoo_81082668"' >> "$DEFCONFIG"
            fi
            sed -i 's/# CONFIG_DEVTMPFS is not set/CONFIG_DEVTMPFS=y/' "$DEFCONFIG"
            if ! grep -q "CONFIG_DEVTMPFS=y" "$DEFCONFIG"; then
              echo "CONFIG_DEVTMPFS=y" >> "$DEFCONFIG"
            fi
            if ! grep -q "CONFIG_DEVTMPFS_MOUNT=y" "$DEFCONFIG"; then
              echo "CONFIG_DEVTMPFS_MOUNT=y" >> "$DEFCONFIG"
            fi
            for opt in CGROUPS CGROUP_FREEZER CGROUP_DEVICE CGROUP_CPUACCT CGROUP_SCHED CGROUP_PIDS MEMCG BLK_CGROUP CPUSETS; do
              sed -i "s/# CONFIG_${opt} is not set/CONFIG_${opt}=y/" "$DEFCONFIG"
              if ! grep -q "CONFIG_${opt}=y" "$DEFCONFIG"; then
                echo "CONFIG_${opt}=y" >> "$DEFCONFIG"
              fi
            done
            for opt in TMPFS POSIX_MQUEUE SIGNALFD TIMERFD EVENTFD EPOLL FUTEX INOTIFY_USER FHANDLE SYSFS; do
              sed -i "s/# CONFIG_${opt} is not set/CONFIG_${opt}=y/" "$DEFCONFIG"
              if ! grep -q "CONFIG_${opt}=y" "$DEFCONFIG"; then
                echo "CONFIG_${opt}=y" >> "$DEFCONFIG"
              fi
            done
            echo "  LOCALVERSION: $(grep CONFIG_LOCALVERSION= "$DEFCONFIG")"
            echo "  DEVTMPFS: $(grep CONFIG_DEVTMPFS "$DEFCONFIG" | head -2)"
            echo "  CGROUPS: $(grep CONFIG_CGROUPS "$DEFCONFIG" | head -2)"
            echo "  TMPFS: $(grep CONFIG_TMPFS "$DEFCONFIG" | head -1)"
          done

          echo ""
          echo "=== Fix SDK missing scripts and copy DTS ==="
          KERNEL_VERSION="4.4.35"
          SDK_KERNEL="source/kernel/linux-4.4.y"
          if [ ! -d "${SDK_KERNEL}/scripts/basic" ] || [ ! -d "${SDK_KERNEL}/scripts/kconfig" ]; then
            wget -q "https://mirrors.edge.kernel.org/pub/linux/kernel/v4.x/linux-${KERNEL_VERSION}.tar.gz"
            tar xzf "linux-${KERNEL_VERSION}.tar.gz"
            [ ! -d "${SDK_KERNEL}/scripts/basic" ] && cp -r "linux-${KERNEL_VERSION}/scripts/basic/" "${SDK_KERNEL}/scripts/"
            [ ! -d "${SDK_KERNEL}/scripts/kconfig" ] && cp -r "linux-${KERNEL_VERSION}/scripts/kconfig/" "${SDK_KERNEL}/scripts/"
          fi
          if [ -f "../dts/hi3798mv100.dts" ]; then
            cp ../dts/hi3798mv100.dts "${SDK_KERNEL}/arch/arm/boot/dts/"
            if ! grep -q "hi3798mv100.dts" "${SDK_KERNEL}/arch/arm/boot/dts/Makefile" 2>/dev/null; then
              echo "dtb-\$(CONFIG_ARCH_HI3798MV100) += hi3798mv100.dtb" >> "${SDK_KERNEL}/arch/arm/boot/dts/Makefile"
            fi
          fi

          echo ""
          echo "=== Build kernel with SDK ==="
          cp configs/hi3798mv100/hi3798mdmo1g_hi3798mv100_cfg.mak cfg.mak
          source env.sh
          make linux -j$(nproc) 2>&1 | tee /tmp/sdk_build.log | tail -10

          echo ""
          echo "=== Check kernel version ==="
          SDK_KERNEL_BIN="out/hi3798mv100/hi3798mdmo1g/image/emmc_image/hi_kernel.bin"
          if [ -f "$SDK_KERNEL_BIN" ] && strings "$SDK_KERNEL_BIN" | grep -q "4.4.35_ecoo"; then
            echo "OK: Version is 4.4.35_ecoo_81082668"
          else
            echo "Version is wrong, doing incremental fix..."
            echo ""

            OUT_DIR="out/hi3798mv100/hi3798mdmo1g/obj/source/kernel/linux-4.4.y"
            SDK_CROSS=$(grep -oP 'CROSS_COMPILE=\K\S+' /tmp/sdk_build.log 2>/dev/null | head -1)
            [ -z "$SDK_CROSS" ] && SDK_CROSS="arm-histbv310-linux-"
            echo "CROSS_COMPILE: $SDK_CROSS"

            TOOLCHAIN_BIN=$(find tools/ -name "arm-his*-linux" -type d 2>/dev/null | head -1)/bin
            echo "TOOLCHAIN_BIN: $TOOLCHAIN_BIN"
            export PATH="$TOOLCHAIN_BIN:$PATH"

            echo ""
            echo "Patching .config in out/ directory..."
            if [ -f "$OUT_DIR/.config" ]; then
              sed -i 's/CONFIG_LOCALVERSION=".*"/CONFIG_LOCALVERSION="_ecoo_81082668"/' "$OUT_DIR/.config"
              if ! grep -q 'CONFIG_LOCALVERSION=' "$OUT_DIR/.config"; then
                echo 'CONFIG_LOCALVERSION="_ecoo_81082668"' >> "$OUT_DIR/.config"
              fi
              sed -i 's/CONFIG_LOCALVERSION_AUTO=y/# CONFIG_LOCALVERSION_AUTO is not set/' "$OUT_DIR/.config"
              for opt in DEVTMPFS DEVTMPFS_MOUNT CGROUPS CGROUP_FREEZER CGROUP_DEVICE CGROUP_CPUACCT CGROUP_SCHED CGROUP_PIDS MEMCG BLK_CGROUP CPUSETS TMPFS POSIX_MQUEUE SIGNALFD TIMERFD EVENTFD EPOLL FUTEX INOTIFY_USER FHANDLE SYSFS; do
                sed -i "s/# CONFIG_${opt} is not set/CONFIG_${opt}=y/" "$OUT_DIR/.config"
                if ! grep -q "CONFIG_${opt}=y" "$OUT_DIR/.config"; then
                  echo "CONFIG_${opt}=y" >> "$OUT_DIR/.config"
                fi
              done
              echo "Patched .config:"
              grep "CONFIG_LOCALVERSION=" "$OUT_DIR/.config"
              grep "CONFIG_DEVTMPFS" "$OUT_DIR/.config"
            fi

            echo ""
            echo "Deleting cached version files..."
            rm -f "$OUT_DIR/include/config/kernel.release"
            rm -f "$OUT_DIR/include/generated/utsrelease.h"
            rm -f "$OUT_DIR/include/generated/compile.h"
            rm -f "$OUT_DIR/init/version.o"
            rm -f "$OUT_DIR/init/do_mounts.o"
            rm -f "$OUT_DIR/drivers/base/devtmpfs.o"

            echo ""
            echo "Incremental rebuild with O=..."
            make ARCH=arm CROSS_COMPILE=$SDK_CROSS O="$OUT_DIR" -j$(nproc) 2>&1 | tail -10
            make ARCH=arm CROSS_COMPILE=$SDK_CROSS O="$OUT_DIR" uImage 2>&1 || true

            echo ""
            echo "Verify after incremental rebuild:"
            if [ -f "$SDK_KERNEL_BIN" ]; then
              strings "$SDK_KERNEL_BIN" | grep "4.4.35" | head -5
              if strings "$SDK_KERNEL_BIN" | grep -q "4.4.35_ecoo"; then
                echo "OK: Version is 4.4.35_ecoo_81082668"
              else
                echo "FAIL: Version still wrong"
              fi
            fi
          fi

      - name: Build fastboot (hiboot) with 1GB DDR config
        run: |
          cd HiSTBLinuxV100R005C00SPC060
          source env.sh

          echo "=== Current DDR config ==="
          grep -i "DDR\|ddr\|BOOT_REG" cfg.mak 2>/dev/null || echo "No DDR config found in cfg.mak"

          echo ""
          echo "=== Searching for DDR reg files ==="
          find source/boot -name "*.reg" 2>/dev/null | grep -i hi3798 | head -20
          find source/boot -name "*.reg" 2>/dev/null | grep -i ddr | head -20

          echo ""
          echo "=== Building fastboot (hiboot) ==="
          make hiboot -j$(nproc) 2>&1 | tail -30 || {
            echo "WARNING: make hiboot failed"
          }

          echo ""
          echo "=== Checking fastboot output ==="
          FASTBOOT_DIR="out/hi3798mv100/hi3798mdmo1g/image/emmc_image"
          if [ -f "$FASTBOOT_DIR/fastboot.bin" ]; then
            echo "✅ fastboot.bin built: $(ls -lh $FASTBOOT_DIR/fastboot.bin | awk '{print $5}')"
            file "$FASTBOOT_DIR/fastboot.bin"
          else
            echo "❌ fastboot.bin not found"
            find out/ -name "fastboot*" -type f 2>/dev/null | head -10
          fi

          if [ -f "$FASTBOOT_DIR/bootargs.bin" ]; then
            echo "✅ bootargs.bin found: $(ls -lh $FASTBOOT_DIR/bootargs.bin | awk '{print $5}')"
          else
            echo "❌ bootargs.bin not found"
          fi

          echo ""
          echo "=== Generating 1GB bootargs.bin ==="
          printf 'model=mv100 console=ttyAMA0,115200 root=/dev/mmcblk0p9 rootfstype=ext4 rootwait mem=1G mmz=ddr,0,0,60M vmalloc=500M blkdevparts=mmcblk0:1M(boot),1M(bootargs),4M(baseparam),4M(pqparam),4M(logo),20M(kernel),64M(busybox),512M(backup),-(ubuntu)\n' > /tmp/bootargs_1g.txt

          echo "1GB bootargs content:"
          cat /tmp/bootargs_1g.txt

          TOOLCHAIN_BIN=$(find tools/ -name "arm-his*-linux" -type d 2>/dev/null | head -1)/bin
          export PATH="$TOOLCHAIN_BIN:$PATH"

          MKBOOTARGS=""
          for f in $(find . -name "mkbootargs" -type f 2>/dev/null); do
            echo "Found mkbootargs: $f"
            MKBOOTARGS="$f"
          done

          if [ -n "$MKBOOTARGS" ]; then
            echo "Generating bootargs.bin with mkbootargs..."
            $MKBOOTARGS -s 1M -r /tmp/bootargs_1g.txt -o /tmp/bootargs_1g.bin 2>&1 || {
              echo "mkbootargs failed, trying alternative method..."
            }
          fi

          if [ ! -f /tmp/bootargs_1g.bin ]; then
            echo "Creating bootargs.bin manually..."
            dd if=/dev/zero of=/tmp/bootargs_1g.bin bs=1M count=1 2>/dev/null
            cat /tmp/bootargs_1g.txt | dd of=/tmp/bootargs_1g.bin bs=1 conv=notrunc 2>/dev/null
          fi

          if [ -f /tmp/bootargs_1g.bin ]; then
            echo "✅ bootargs_1g.bin created: $(ls -lh /tmp/bootargs_1g.bin | awk '{print $5}')"
            cp /tmp/bootargs_1g.bin "$FASTBOOT_DIR/bootargs_1g.bin" 2>/dev/null || true
          fi

          echo ""
          echo "=== Generating 512MB bootargs.bin (safe fallback) ==="
          printf 'model=mv100 console=ttyAMA0,115200 root=/dev/mmcblk0p9 rootfstype=ext4 rootwait mem=512M mmz=ddr,0,0,48M vmalloc=500M blkdevparts=mmcblk0:1M(boot),1M(bootargs),4M(baseparam),4M(pqparam),4M(logo),20M(kernel),64M(busybox),512M(backup),-(ubuntu)\n' > /tmp/bootargs_512m.txt

          if [ -n "$MKBOOTARGS" ]; then
            $MKBOOTARGS -s 1M -r /tmp/bootargs_512m.txt -o /tmp/bootargs_512m.bin 2>&1 || true
          fi

          if [ ! -f /tmp/bootargs_512m.bin ]; then
            dd if=/dev/zero of=/tmp/bootargs_512m.bin bs=1M count=1 2>/dev/null
            cat /tmp/bootargs_512m.txt | dd of=/tmp/bootargs_512m.bin bs=1 conv=notrunc 2>/dev/null
          fi

          if [ -f /tmp/bootargs_512m.bin ]; then
            echo "✅ bootargs_512m.bin created"
            cp /tmp/bootargs_512m.bin "$FASTBOOT_DIR/bootargs_512m.bin" 2>/dev/null || true
          fi

      - name: Build SDK sample programs and display init
        run: |
          cd HiSTBLinuxV100R005C00SPC060
          source env.sh

          TOOLCHAIN_BIN=$(find tools/ -name "arm-his*-linux" -type d 2>/dev/null | head -1)/bin
          export PATH="$TOOLCHAIN_BIN:$PATH"
          SDK_CROSS="arm-histbv310-linux-"
          echo "Using cross-compiler: ${SDK_CROSS}gcc"
          ${SDK_CROSS}gcc --version 2>/dev/null | head -1 || echo "Cross-compiler not found!"

          echo ""
          echo "=== Looking for SDK MPP headers ==="
          MSP_INC=""
          for d in $(find source -type d -name "include" 2>/dev/null); do
            if [ -f "$d/hi_comm_vo.h" ]; then
              MSP_INC="$d"
              echo "Found MPP headers: $d"
              break
            fi
          done
          if [ -z "$MSP_INC" ]; then
            echo "WARNING: MPP headers not found, searching broader..."
            find source -name "hi_comm_vo.h" 2>/dev/null
            find source -name "hi_mpi_vo.h" 2>/dev/null
            find source -name "hi_type.h" 2>/dev/null
          fi

          echo ""
          echo "=== Looking for SDK MPP libraries ==="
          OUT_DIR="out/hi3798mv100/hi3798mdmo1g"
          MSP_LIB=""
          echo "Searching all lib directories..."
          for d in $(find . -type d -name "lib" 2>/dev/null | grep -v ".git"); do
            if ls "$d"/libhi_* 2>/dev/null >/dev/null; then
              echo "Found SDK libs in: $d"
              ls -lh "$d"/libhi_* 2>/dev/null
              if [ -z "$MSP_LIB" ]; then
                MSP_LIB="$d"
              fi
            fi
          done || true
          if [ -z "$MSP_LIB" ]; then
            echo "No SDK libs found in lib/ dirs, searching all files..."
            find . \( -name "libhi_msp*" -o -name "libhi_vo*" -o -name "libhi_hdmi*" -o -name "libhi_sys*" \) ! -path "*/.git/*" 2>/dev/null || true
          fi

          echo ""
          echo "=== Trying to build SDK MSP libraries ==="
          make msp -j$(nproc) 2>&1 | tail -10 || {
            echo "WARNING: make msp failed, trying make all..."
            make all -j$(nproc) 2>&1 | tail -10 || {
              echo "WARNING: make all also failed, will use standalone dlopen build"
            }
          } || true

          echo ""
          echo "Re-searching for SDK libraries after build..."
          for d in $(find . -type d -name "lib" 2>/dev/null | grep -v ".git"); do
            if ls "$d"/libhi_* 2>/dev/null >/dev/null; then
              echo "Found SDK libs in: $d"
              ls -lh "$d"/libhi_* 2>/dev/null
              if [ -z "$MSP_LIB" ]; then
                MSP_LIB="$d"
              fi
            fi
          done || true

          echo ""
          echo "=== Building SDK sample programs ==="
          make sample -j$(nproc) 2>&1 | tail -20 || {
            echo "WARNING: make sample failed"
          } || true

          echo ""
          echo "=== Checking for sample binaries ==="
          find "$OUT_DIR" -name "sample_*" -type f -executable 2>/dev/null | head -20 || true

          echo ""
          echo "Searching for libhi_msp.so specifically..."
          find . -name "libhi_msp.so" ! -path "*/.git/*" 2>/dev/null | while read f; do
            echo "  Found: $f"
            mkdir -p output/lib
            cp "$f" output/lib/ 2>/dev/null || true
          done

          echo ""
          echo "=== Building display init program ==="
          mkdir -p output/bin

          cp ../src/hi_display_init.c /tmp/hi_display_init.c

          echo "Searching for SDK MSP headers..."
          MSP_INC=""
          for d in $(find source -type d -name "include" 2>/dev/null | grep -v ".git"); do
            if [ -f "$d/hi_comm_vo.h" ]; then
              MSP_INC="$d"
              echo "Found MPP headers: $d"
              break
            fi
          done || true

          echo "Searching for SDK MSP libraries..."
          MSP_LIB=""
          for d in $(find . -type d -name "lib" 2>/dev/null | grep -v ".git"); do
            if ls "$d"/libhi_msp* 2>/dev/null >/dev/null; then
              echo "Found SDK libs in: $d"
              ls -lh "$d"/libhi_msp* 2>/dev/null
              if [ -z "$MSP_LIB" ]; then
                MSP_LIB="$d"
              fi
            fi
          done || true

          if [ -n "$MSP_INC" ] && [ -n "$MSP_LIB" ]; then
            echo "Compiling with SDK headers and STATIC linking against libhi_msp.a..."
            ${SDK_CROSS}gcc -o output/bin/hi_display_init /tmp/hi_display_init.c \
              -I"$MSP_INC" -L"$MSP_LIB" -lhi_msp -lpthread -lm -ldl -static 2>&1 || {
              echo "Static linking failed, trying dynamic with rpath..."
              ${SDK_CROSS}gcc -o output/bin/hi_display_init /tmp/hi_display_init.c \
                -I"$MSP_INC" -L"$MSP_LIB" -lhi_msp -lpthread -lm -ldl \
                -Wl,-rpath,/opt/hisilicon/lib 2>&1 || {
                echo "Dynamic linking also failed, falling back to dlopen..."
                ${SDK_CROSS}gcc -o output/bin/hi_display_init /tmp/hi_display_init.c -ldl -lpthread -static 2>&1 || {
                  echo "WARNING: All compilation attempts failed"
                }
              }
            }
          else
            echo "No SDK headers/libs found, building standalone dlopen-based program (static)..."
            ${SDK_CROSS}gcc -o output/bin/hi_display_init /tmp/hi_display_init.c -ldl -lpthread -static 2>&1 || {
              echo "WARNING: Failed to compile display init program"
            }
          fi

          if [ -f output/bin/hi_display_init ]; then
            echo "Display init program built successfully"
            file output/bin/hi_display_init
          fi

      - name: Prepare and upload artifacts
        run: |
          mkdir -p output/bin output/lib output/kmodules output/boot

          echo "=== Copying pre-built files from SDK directory ==="
          if [ -d "HiSTBLinuxV100R005C00SPC060/output" ]; then
            cp -rv HiSTBLinuxV100R005C00SPC060/output/* output/ 2>/dev/null || true
          fi

          echo ""
          echo "=== Collecting boot files (fastboot + bootargs) ==="
          BOOT_DIR="output/boot"
          SDK_BOOT_DIR="HiSTBLinuxV100R005C00SPC060/out/hi3798mv100/hi3798mdmo1g/image/emmc_image"

          for f in fastboot.bin bootargs.bin bootargs_1g.bin bootargs_512m.bin; do
            if [ -f "$SDK_BOOT_DIR/$f" ]; then
              echo "  ✅ Found: $f"
              cp "$SDK_BOOT_DIR/$f" "$BOOT_DIR/" 2>/dev/null || true
            else
              echo "  ❌ Not found: $f"
            fi
          done

          echo ""
          echo "=== Searching for DDR reg files ==="
          find HiSTBLinuxV100R005C00SPC060/source/boot -name "*.reg" 2>/dev/null | grep -i hi3798 | while read f; do
            echo "  Found DDR reg: $f"
            cp "$f" "$BOOT_DIR/" 2>/dev/null || true
          done || true

          echo ""
          echo "Boot files collected:"
          ls -lh "$BOOT_DIR/" 2>/dev/null || echo "No boot files found"

          SDK_KERNEL="HiSTBLinuxV100R005C00SPC060/out/hi3798mv100/hi3798mdmo1g/image/emmc_image/hi_kernel.bin"
          OUT_UIMAGE="HiSTBLinuxV100R005C00SPC060/out/hi3798mv100/hi3798mdmo1g/obj/source/kernel/linux-4.4.y/arch/arm/boot/uImage"

          KERNEL_SRC=""
          for f in "$SDK_KERNEL" "$OUT_UIMAGE"; do
            if [ -f "$f" ]; then
              echo "Using: $f"
              KERNEL_SRC="$f"
              break
            fi
          done

          if [ -z "$KERNEL_SRC" ]; then
            echo "ERROR: No kernel found"
            exit 1
          fi

          cp "$KERNEL_SRC" output/hi_kernel_new.bin

          echo ""
          echo "=== Collecting kernel modules ==="
          OUT_DIR="HiSTBLinuxV100R005C00SPC060/out/hi3798mv100/hi3798mdmo1g"
          KO_DIR="output/kmodules"

          mkdir -p "$KO_DIR"

          echo "Searching for KO modules in SDK output..."
          find "$OUT_DIR" -name "*.ko" -type f 2>/dev/null | while read ko; do
            echo "  Found: $ko"
            cp "$ko" "$KO_DIR/"
          done

          echo ""
          echo "Searching for KO modules in SDK image directory..."
          IMAGE_DIR="HiSTBLinuxV100R005C00SPC060/out/hi3798mv100/hi3798mdmo1g/image"
          find "$IMAGE_DIR" -name "*.ko" -type f 2>/dev/null | while read ko; do
            echo "  Found: $ko"
            cp "$ko" "$KO_DIR/" 2>/dev/null || true
          done

          echo ""
          echo "KO modules collected: $(ls "$KO_DIR"/*.ko 2>/dev/null | wc -l)"

          echo ""
          echo "=== Collecting SDK sample programs and binaries ==="
          BIN_DIR="output/bin"
          mkdir -p "$BIN_DIR"

          echo "Searching for sample programs..."
          find "$OUT_DIR" -name "sample_*" -type f -executable 2>/dev/null | while read f; do
            echo "  Found: $f"
            cp "$f" "$BIN_DIR/" 2>/dev/null || true
          done

          echo "Searching for boot logo programs..."
          find "$OUT_DIR" \( -name "boot_logo" -o -name "hi_bootlogo" -o -name "hisi_logo*" \) -type f 2>/dev/null | while read f; do
            echo "  Found: $f"
            cp "$f" "$BIN_DIR/" 2>/dev/null || true
          done

          echo "Searching for init scripts..."
          find "$OUT_DIR" -name "*.sh" -path "*/init*" -type f 2>/dev/null | while read f; do
            echo "  Found: $f"
            cp "$f" "$BIN_DIR/" 2>/dev/null || true
          done
          find "$OUT_DIR" -name "hi_init.sh" -type f 2>/dev/null | while read f; do
            echo "  Found: $f"
            cp "$f" "$BIN_DIR/" 2>/dev/null || true
          done

          if [ -f "HiSTBLinuxV100R005C00SPC060/output/bin/hi_display_init" ]; then
            cp "HiSTBLinuxV100R005C00SPC060/output/bin/hi_display_init" "$BIN_DIR/"
          fi

          echo ""
          echo "=== Collecting SDK shared libraries ==="
          LIB_DIR="output/lib"
          mkdir -p "$LIB_DIR"

          echo "Searching in out/ directory..."
          find "$OUT_DIR" -name "libhi_*.so*" -type f 2>/dev/null | while read f; do
            echo "  Found: $f"
            cp "$f" "$LIB_DIR/" 2>/dev/null || true
          done || true

          find "$OUT_DIR" -name "libhi_*.so" -type l 2>/dev/null | while read f; do
            echo "  Found symlink: $f"
            cp -P "$f" "$LIB_DIR/" 2>/dev/null || true
          done || true

          echo "Searching in entire SDK..."
          find HiSTBLinuxV100R005C00SPC060 -name "libhi_*.so*" -type f 2>/dev/null | grep -v ".git" | while read f; do
            echo "  Found: $f"
            cp "$f" "$LIB_DIR/" 2>/dev/null || true
          done || true

          find HiSTBLinuxV100R005C00SPC060 -name "libhi_*.a" -type f 2>/dev/null | grep -v ".git" | while read f; do
            echo "  Found static: $f"
            cp "$f" "$LIB_DIR/" 2>/dev/null || true
          done || true

          echo "Searching specifically for libhi_msp.so..."
          find HiSTBLinuxV100R005C00SPC060 -name "libhi_msp.so" -type f 2>/dev/null | grep -v ".git" | while read f; do
            echo "  Found: $f"
            cp "$f" "$LIB_DIR/" 2>/dev/null || true
          done

          echo "Collecting SDK toolchain runtime libraries (soft-float libc for libhi_msp.so)..."
          TC_BASE="HiSTBLinuxV100R005C00SPC060/tools/linux/toolchains/arm-histbv310-linux"
          if [ -d "$TC_BASE" ]; then
            echo "  Found toolchain at: $TC_BASE"
            for subdir in "arm-gcc49-linux-gnueabi/libc/lib" "arm-gcc49-linux-gnueabi/libc/usr/lib" "lib" "arm-gcc49-linux-gnueabi/lib"; do
              if [ -d "$TC_BASE/$subdir" ]; then
                echo "  Checking: $subdir"
                for lib in libc.so.6 libc-2.27.so libm.so.6 libm-2.27.so libpthread.so.0 libpthread-2.27.so libdl.so.2 libdl-2.27.so librt.so.1 librt-2.27.so ld-linux.so.3 ld-linux-armhf.so.3; do
                  if [ -f "$TC_BASE/$subdir/$lib" ]; then
                    echo "    Found: $lib"
                    cp "$TC_BASE/$subdir/$lib" "$LIB_DIR/" 2>/dev/null || true
                  fi
                done
              fi
            done
            find "$TC_BASE" -name "ld-linux*" -type f 2>/dev/null | while read f; do
              echo "  Found linker: $f"
              cp "$f" "$LIB_DIR/" 2>/dev/null || true
            done
          else
            echo "  Toolchain directory not found, searching entire SDK..."
            find HiSTBLinuxV100R005C00SPC060/tools -name "libc-2.27.so" -type f 2>/dev/null | grep -v ".git" | while read f; do
              echo "  Found SDK libc: $f"
              cp "$f" "$LIB_DIR/" 2>/dev/null || true
              DIR=$(dirname "$f")
              for lib in libm-2.27.so libpthread-2.27.so libdl-2.27.so librt-2.27.so ld-linux.so.3; do
                if [ -f "$DIR/$lib" ]; then
                  cp "$DIR/$lib" "$LIB_DIR/" 2>/dev/null || true
                fi
              done
            done
          fi

          echo "Searching for Mali GPU libraries in SDK..."
          find HiSTBLinuxV100R005C00SPC060 -name "libmali*" -type f 2>/dev/null | grep -v ".git" | while read f; do
            echo "  Found Mali: $f"
            cp "$f" "$LIB_DIR/" 2>/dev/null || true
          done || true

          find HiSTBLinuxV100R005C00SPC060 -name "libEGL*" -o -name "libGLES*" -o -name "libUMP*" -o -name "libump*" 2>/dev/null | grep -v ".git" | grep -v "mesa" | while read f; do
            echo "  Found GPU lib: $f"
            cp "$f" "$LIB_DIR/" 2>/dev/null || true
          done || true

          echo ""
          echo "=== Downloading ARM Mali-450 user-space driver ==="
          MALI_TARBALL="mali-450_r7p0-01rel0_linux-armhf_1.tar.gz"
          MALI_URL="https://developer.arm.com/-/media/Files/downloads/mali-drivers/user-space/hikey/${MALI_TARBALL}"
          MALI_DIR="mali-450_r7p0-01rel0_linux-armhf_1"

          echo "Downloading from ARM developer site..."
          wget -q --show-progress -O "/tmp/${MALI_TARBALL}" "${MALI_URL}" 2>&1 || {
            echo "ARM download failed, trying alternative URL..."
            wget -q --show-progress -O "/tmp/${MALI_TARBALL}" "https://developer.arm.com/-/media/Files/downloads/mali-drivers/user-space/DX910-SW-99002-r7p0-01rel0/${MALI_TARBALL}" 2>&1 || {
              echo "WARNING: Could not download Mali user-space driver from ARM"
            }
          }

          if [ -f "/tmp/${MALI_TARBALL}" ] && [ -s "/tmp/${MALI_TARBALL}" ]; then
            echo "Downloaded Mali driver tarball: $(ls -lh /tmp/${MALI_TARBALL} | awk '{print $5}')"
            mkdir -p /tmp/mali_extract
            tar xzf "/tmp/${MALI_TARBALL}" -C /tmp/mali_extract/ 2>&1 || {
              echo "WARNING: Failed to extract Mali tarball"
            }

            echo "Contents of Mali driver package:"
            find /tmp/mali_extract -type f 2>/dev/null | head -30

            echo ""
            echo "Searching for libMali.so in extracted package..."
            for backend in fbdev x11 wayland-drm drm; do
              MALI_LIB="/tmp/mali_extract/${MALI_DIR}/${backend}/libMali.so"
              if [ -f "$MALI_LIB" ]; then
                echo "  Found libMali.so for backend: ${backend}"
                cp "$MALI_LIB" "$LIB_DIR/libMali.so.${backend}.r7p0" 2>/dev/null || true
                file "$MALI_LIB"
              fi
            done

            for f in $(find /tmp/mali_extract -name "libMali.so" -type f 2>/dev/null); do
              echo "  Found: $f"
              BACKEND=$(basename $(dirname "$f"))
              if [ ! -f "$LIB_DIR/libMali.so.${BACKEND}.r7p0" ]; then
                cp "$f" "$LIB_DIR/libMali.so.${BACKEND}.r7p0" 2>/dev/null || true
              fi
              file "$f"
            done
          else
            echo "WARNING: Mali driver tarball not available, trying Xilinx repo..."
          fi

          echo ""
          echo "Also checking for Xilinx Mali-400 r9p0 driver..."
          wget -q --show-progress -O "/tmp/mali_xilinx.zip" "https://github.com/Xilinx/mali-userspace-binaries/archive/refs/heads/master.zip" 2>&1 || true
          if [ -f "/tmp/mali_xilinx.zip" ] && [ -s "/tmp/mali_xilinx.zip" ]; then
            mkdir -p /tmp/mali_xilinx
            unzip -q -o "/tmp/mali_xilinx.zip" -d /tmp/mali_xilinx/ 2>&1 || true
            echo "Xilinx Mali package contents (arm32):"
            find /tmp/mali_xilinx -name "libMali.so*" -type f 2>/dev/null | while read f; do
              echo "  Found: $f"
              file "$f"
            done
            for backend in fbdev x11 wayland; do
              for f in $(find /tmp/mali_xilinx -path "*/aarch_b/${backend}*" -name "libMali.so*" -type f 2>/dev/null); do
                echo "  Copying Xilinx arm32 ${backend}: $f"
                cp "$f" "$LIB_DIR/" 2>/dev/null || true
              done
            done
          fi

          echo ""
          echo "Binaries collected: $(ls "$BIN_DIR/" 2>/dev/null | wc -l)"
          ls -lh "$BIN_DIR/" 2>/dev/null || echo "No binaries found"

          echo ""
          echo "Libraries collected: $(ls "$LIB_DIR/" 2>/dev/null | wc -l)"
          ls -lh "$LIB_DIR/" 2>/dev/null || echo "No libraries found"

          echo ""
          echo "=== Final verification ==="
          echo "Size: $(du -h output/hi_kernel_new.bin | cut -f1)"
          strings output/hi_kernel_new.bin | grep "4.4.35" | head -5
          if strings output/hi_kernel_new.bin | grep -q "4.4.35_ecoo"; then
            echo "OK: Version matches 4.4.35_ecoo_81082668"
          else
            echo "FAIL: Version does NOT match!"
          fi

      - name: Create first-boot fix script
        run: |
          mkdir -p output/scripts
          cat > output/scripts/first_boot_fix.sh << 'FIXEOF'
          #!/bin/sh
          echo "=== Hi3798MV100 First Boot Fix ==="

          echo "[1/6] NUKING ALL swap services..."
          for svc in create-swapfile.service swap-create.service swapfile.service \
                     create_swapfile.service swapfile.swap dev-swapfile.swap \
                     systemd-swap.service swap.target; do
              ln -sf /dev/null /etc/systemd/system/$svc 2>/dev/null
          done
          find /etc/systemd /usr/lib/systemd /lib/systemd -name "*swap*" -type f -delete 2>/dev/null || true
          find /etc/systemd /usr/lib/systemd /lib/systemd -name "*swap*" -type l -delete 2>/dev/null || true
          find /etc/systemd/system -name "*.wants" -type d -exec sh -c "rm -f {}/*swap* {}/*swapfile*" \; 2>/dev/null || true
          find /etc/systemd/system -name "*.requires" -type d -exec sh -c "rm -f {}/*swap* {}/*swapfile*" \; 2>/dev/null || true
          sed -i '/swap/d' /etc/fstab
          sed -i '/swapfile/d' /etc/fstab
          rm -f /swapfile
          swapoff -a 2>/dev/null || true

          echo "[2/6] Writing 1GB bootargs to eMMC..."
          dd if=/dev/zero of=/dev/mmcblk0p2 bs=1M count=1 2>/dev/null
          printf 'model=mv100 console=ttyAMA0,115200 root=/dev/mmcblk0p9 rootfstype=ext4 rootwait rootflags=noload mem=1G mmz=ddr,0,0,60M vmalloc=500M systemd.mask=create-swapfile.service systemd.mask=swap-create.service systemd.mask=swapfile.service blkdevparts=mmcblk0:1M(boot),1M(bootargs),4M(baseparam),4M(pqparam),4M(logo),20M(kernel),64M(busybox),512M(backup),-(ubuntu)' | dd of=/dev/mmcblk0p2 bs=1 conv=notrunc 2>/dev/null

          echo "[3/6] Fixing DNS..."
          chattr -i /etc/resolv.conf 2>/dev/null
          rm -f /etc/resolv.conf
          echo 'nameserver 223.5.5.5' > /etc/resolv.conf
          echo 'nameserver 119.29.29.29' >> /etc/resolv.conf
          chattr +i /etc/resolv.conf 2>/dev/null || true

          echo "[4/6] Fixing apt seccomp..."
          mkdir -p /etc/apt/apt.conf.d
          echo 'APT::Sandbox::Seccomp "false";' > /etc/apt/apt.conf.d/99no-seccomp
          echo 'APT::Sandbox::User "root";' >> /etc/apt/apt.conf.d/99no-seccomp

          echo "[5/6] Fixing ext4 filesystem..."
          sync

          echo "[6/6] Verifying no swap services remain..."
          find /etc/systemd /usr/lib/systemd /lib/systemd -name "*swap*" 2>/dev/null | grep -v kill-swap | grep -v noswap || echo "OK: No swap units"

          echo "=== First boot fix complete! Rebooting in 3 seconds... ==="
          sleep 3
          reboot
          FIXEOF
          chmod +x output/scripts/first_boot_fix.sh
          echo "Created first_boot_fix.sh"

      - name: Upload kernel artifact
        uses: actions/upload-artifact@v4
        with:
          name: hi3798mv100-kernel
          path: output/
          retention-days: 30
